<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>lofi lab | Lofi Dental</title>
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
      }

      :root {
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.22);
        --card: rgba(255, 255, 255, 0.95);
        --amber: #cdd7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
          linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
      }

      .logo-link {
        display: inline-block;
        line-height: 0;
      }

      .logo-img {
        max-width: 432px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .nav-back {
        margin-left: auto;
      }

      .nav-back a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        text-decoration: none;
      }

      .nav-back svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      main {
        margin-top: 30px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(1.7rem, 3vw, 2.5rem);
      }

      .intro {
        margin: 0 0 20px;
        color: var(--soft-ink);
        line-height: 1.7;
      }

      .reels {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .reel {
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: var(--card);
        box-shadow: 0 10px 24px rgba(27, 39, 35, 0.04);
      }

      .reel iframe {
        width: 100%;
        aspect-ratio: 9 / 16;
        border: 0;
        display: block;
      }

      .bottom-cta {
        margin-top: 30px;
        display: flex;
        justify-content: center;
      }

      .btn {
        text-decoration: none;
        border-radius: 999px;
        padding: 14px 22px;
        font-weight: 600;
        font-size: 1rem;
        border: 1px solid transparent;
        transition: 180ms ease;
      }

      .btn-primary {
        color: #1f2d66;
        background: var(--amber);
        box-shadow: 0 12px 28px rgba(27, 39, 35, 0.12);
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 820px) {
        .reels {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(560px, 92vw);
        }

        .logo-img {
          max-width: min(360px, 78vw);
        }

        .reel {
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/korean" aria-label="Lofi Dental Korean home">
          <img src="assets/로우파이치과의원 purplebluenobg.png" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-back">
          <a href="/korean" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 18 9 12l6-6" />
            </svg>
          </a>
        </nav>
      </header>

      <main>
        <h1>lofi lab</h1>
        <p class="intro">대표원장과 세라미스트가 협업하여 <br />수작업으로 만들어내는 라미네이트, <br />lofi veneer입니다.</p>
        <section class="reels" aria-label="lofi lab youtube shorts">
          <div class="reel">
            <iframe
              src="https://www.youtube.com/embed/AAPNGmizVac"
              title="lofi lab youtube short 1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
          <div class="reel">
            <iframe
              src="https://www.youtube.com/embed/t9qh_0y6Jlw"
              title="lofi lab youtube short 2"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
          <div class="reel">
            <iframe
              src="https://www.youtube.com/embed/b6I14PwV4Fk"
              title="lofi lab youtube short 3"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
        </section>
        <div class="bottom-cta">
          <a class="btn btn-primary" href="/reservation/?lang=ko">예약하기</a>
        </div>
      </main>
    </div>
  </body>
</html>
