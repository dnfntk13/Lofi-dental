<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>로우파이 이야기 | Lofi Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
      }

      :root {
        color-scheme: light;
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.22);
        --card: rgba(255, 255, 255, 0.95);
        --amber: #cdd7ff;
        --mint: #e6d5f5;
        --accent: #dcc8ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
          linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        flex-wrap: wrap;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .logo-img {
        max-width: 432px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .nav-back {
        margin-left: auto;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .nav-back a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        text-decoration: none;
        color: var(--ink);
        line-height: 1;
        transition: 180ms ease;
      }

      .nav-back svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .nav-back a:hover {
        transform: translateX(-2px);
      }

      main {
        margin-top: 40px;
      }

      .clinic-gallery {
        margin-top: 28px;
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: 14px;
        animation: rise 740ms ease both;
      }

      .gallery-item {
        margin: 0;
        min-height: 0;
        aspect-ratio: 4 / 3;
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        image-orientation: from-image;
      }

      .gallery-item-featured {
        grid-row: span 2;
        aspect-ratio: 4 / 5;
      }

      .gallery-stack {
        display: grid;
        gap: 14px;
      }

      .gallery-strip {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .video-section {
        margin: 32px auto 0;
        width: min(420px, 100%);
        animation: rise 780ms ease both;
      }

      .video-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 9 / 16;
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .video-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .bottom-cta {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        animation: rise 820ms ease both;
      }

      .btn {
        text-decoration: none;
        border-radius: 999px;
        padding: 14px 22px;
        font-weight: 600;
        font-size: 1rem;
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
        border: 1px solid transparent;
        transition: 180ms ease;
      }

      .btn-primary {
        color: #1f2d66;
        background: var(--amber);
        box-shadow: 0 12px 28px rgba(27, 39, 35, 0.12);
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 820px) {
        body {
          background:
            radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
            radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
            linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
        }

        .clinic-gallery {
          grid-template-columns: 1fr;
        }

        .gallery-item-featured {
          grid-row: auto;
          aspect-ratio: 4 / 3;
        }

        .gallery-strip {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(560px, 92vw);
        }

        .gallery-item,
        .gallery-item-featured {
          border-radius: 14px;
        }

        .video-frame {
          border-radius: 14px;
        }

        .gallery-strip {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/" aria-label="Lofi Dental Korean home">
          <img src="assets/logo.png?v=20260615" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-back">
          <a href="/" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 18 9 12l6-6" />
            </svg>
          </a>
        </nav>
      </header>

      <main>
        <section class="clinic-gallery" aria-label="Inside lofi dental">
          <figure class="gallery-item gallery-item-featured">
            <img src="assets/story/waiting-room.jpg" alt="Softly lit waiting room at lofi dental" loading="lazy" />
          </figure>
          <div class="gallery-stack">
            <figure class="gallery-item">
              <img src="assets/story/clinic-entrance.jpg" alt="lofi dental entrance sign" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/shade-lab.jpg" alt="Digital shade matching and ceramic lab equipment" loading="lazy" />
            </figure>
          </div>
          <div class="gallery-strip">
            <figure class="gallery-item">
              <img src="assets/story/treatment.jpg" alt="Clinical treatment at lofi dental" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/collaboration.jpg" alt="Clinical collaboration through the glass lab area" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/operatory.jpg" alt="lofi dental operatory and equipment" loading="lazy" />
            </figure>
          </div>
        </section>
        <section class="video-section" aria-label="lofi dental video">
          <div class="video-frame">
            <iframe
              src="https://www.youtube.com/embed/V9zg-f-gvJg"
              title="lofi dental YouTube Shorts"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
        </section>
        <div class="bottom-cta">
          <a class="btn btn-primary" href="/reservation/?lang=ko">예약하기</a>
        </div>
      </main>
    </div>
  </body>
</html>
