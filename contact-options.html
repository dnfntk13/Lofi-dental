<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <title>Choose Contact Method | lofi dental</title>
    <style>
      :root {
        --bg-cream: #faf5ff;
        --bg-mist: #f0e6ff;
        --ink: #4a2a6b;
        --soft-ink: #8b5fb8;
        --line: rgba(138, 95, 184, 0.24);
        --card: rgba(255, 255, 255, 0.95);
        --accent: #dcc8ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 16% 10%, rgba(220, 200, 237, 0.62), transparent 40%),
          radial-gradient(circle at 84% 18%, rgba(230, 213, 245, 0.66), transparent 44%),
          linear-gradient(170deg, var(--bg-cream) 0%, var(--bg-mist) 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 22px 48px rgba(27, 39, 35, 0.08);
        padding: 32px;
      }

      .options {
        margin-top: 4px;
        display: grid;
        gap: 12px;
      }

      .option-link {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #ffffff;
        padding: 16px 18px;
        color: var(--ink);
        font-size: 1rem;
        font-weight: 700;
        transition: 180ms ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .option-link:hover {
        transform: translateY(-1px);
        background: var(--accent);
      }

      .logo-icon {
        width: 20px;
        height: 20px;
        flex: 0 0 20px;
      }

    </style>
  </head>
  <body>
    <main class="card">
      <div class="options">
        <a class="option-link" href="https://instagram.com/lofi_esthetic_dentistry" aria-label="Consult via Instagram">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8" />
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8" />
            <circle cx="17.3" cy="6.7" r="1.2" fill="currentColor" />
          </svg>
          <span>Consult via Instagram</span>
        </a>
        <a class="option-link" href="https://wa.me/821029848823" aria-label="Consult via WhatsApp">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20.2 11.8c0 4.6-3.7 8.3-8.3 8.3-1.5 0-3-.4-4.2-1.1L3.8 20l1.1-3.6a8.2 8.2 0 0 1-1.4-4.6c0-4.6 3.7-8.3 8.3-8.3s8.4 3.7 8.4 8.3Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9.2 8.9c.2-.4.4-.4.7-.4h.5c.2 0 .4 0 .6.5.2.6.7 2 .8 2.2.1.3 0 .4-.2.6l-.4.5c-.1.1-.2.3 0 .5.2.4 1 1.6 2.4 2.2.3.1.5.1.7-.1l.6-.7c.2-.2.3-.2.6-.1l2 .9c.3.1.5.2.5.4v.4c-.1.4-.6.8-1 1-.3.1-.8.3-1.9.1-1-.2-2.2-.9-3-1.6-.7-.6-1.3-1.4-1.8-2.2-.4-.7-.9-1.8-.8-2.8.1-.9.6-1.3.7-1.5Z" fill="currentColor"/>
          </svg>
          <span>Consult via WhatsApp</span>
        </a>
      </div>
    </main>
  </body>
</html>
