<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Dental</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f6f7f9;
        color: #1c1f26;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 13vw, 8rem);
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: lowercase;
        font-family: "Inter", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
      }

      .language-switcher {
        position: fixed;
        top: 75vh;
        display: flex;
        gap: 20px;
      }

      .language-switcher button {
        border: 1px solid #d1d5df;
        background: #ffffff;
        color: #3a4050;
        font-size: 2rem;
        font-weight: 500;
        cursor: pointer;
        padding: 14px 28px;
        border-radius: 999px;
        font-family: "Inter", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
      }

      .language-switcher button:hover {
        color: #111;
        border-color: #a8afbe;
      }
    </style>
  </head>
  <body>
    <h1>lofi dental</h1>
    <nav class="language-switcher" aria-label="Language options">
      <button type="button">Korean</button>
      <button type="button">English</button>
    </nav>
  </body>
</html>
