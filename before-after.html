<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>비포&애프터 | Lofi Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2508-1@1.0/Paperlogy-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.22);
        --card: rgba(255, 255, 255, 0.94);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Paperlogy", "Nunito Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
          linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        flex-wrap: wrap;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .logo-img {
        max-width: 432px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .nav-back {
        margin-left: auto;
        display: flex;
        align-items: center;
      }

      .nav-back a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        text-decoration: none;
        color: var(--ink);
        transition: 180ms ease;
      }

      .nav-back svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .nav-back a:hover {
        transform: translateX(-2px);
      }

      main {
        margin-top: 40px;
      }

      .case-grid {
        display: grid;
        gap: 18px;
      }

      .case-card {
        width: 100%;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .case-card img {
        width: 100%;
        height: auto;
        display: block;
      }

      .case-card-featured {
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 68%) minmax(240px, 32%);
        align-items: center;
      }

      .case-card-featured img {
        height: 100%;
        object-fit: cover;
      }

      .case-caption {
        margin: 0;
        padding: 28px 30px;
        color: var(--ink);
        font-family: "Noto Serif KR", "Paperlogy", serif;
        font-size: clamp(1.05rem, 1.5vw, 1.34rem);
        font-weight: 600;
        line-height: 1.78;
        text-align: left;
        word-break: keep-all;
      }

      @media (max-width: 820px) {
        .case-card-featured {
          width: 100%;
          margin: 0 auto;
          grid-template-columns: 1fr;
        }

        .case-card-featured img {
          height: auto;
        }

        .case-caption {
          text-align: center;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(560px, 92vw);
        }

        .logo-img {
          max-width: min(360px, 78vw);
        }

        .case-card {
          width: 100%;
          border-radius: 14px;
        }

        .case-caption {
          padding: 16px 16px 18px;
          font-size: 0.98rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/" aria-label="Lofi Dental Korean home">
          <img src="assets/logo.png?v=20260615" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-back">
          <a href="/" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 18 9 12l6-6" />
            </svg>
          </a>
        </nav>
      </header>

      <main>
        <section class="case-grid" aria-label="비포&애프터">
          <figure class="case-card case-card-featured">
            <img src="assets/before-after/case-01.jpg" alt="라미네이트 치료 전후 사례 1" />
            <figcaption class="case-caption">
              “최대한 안건드리고 못생긴 부분만 좀 개선됐으면 좋겠어요”
            </figcaption>
          </figure>
          <figure class="case-card">
            <img src="assets/before-after/case-02.jpg" alt="라미네이트 치료 전후 사례 2" />
          </figure>
        </section>
      </main>
    </div>
  </body>
</html>
