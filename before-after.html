<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>비포&애프터 | Lofi Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --logo-ink: #1f2d66;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.22);
        --card: rgba(255, 255, 255, 0.94);
        --amber: #cdd7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Paperlogy", "Nunito Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
          linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        flex-wrap: wrap;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .logo-img {
        max-width: 432px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .nav-back {
        margin-left: auto;
        display: flex;
        align-items: center;
      }

      .nav-back a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        text-decoration: none;
        color: var(--ink);
        transition: 180ms ease;
      }

      .nav-back svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .nav-back a:hover {
        transform: translateX(-2px);
      }

      main {
        margin-top: 40px;
      }

      .case-grid {
        display: grid;
        gap: 18px;
      }

      .case-card {
        width: 100%;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .case-card-compare {
        width: min(88%, 860px);
      }

      .case-card img {
        width: 100%;
        height: auto;
        display: block;
      }

      .case-card-featured {
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 68%) minmax(240px, 32%);
        align-items: center;
      }

      .case-card-featured img {
        height: 100%;
        object-fit: cover;
      }

      .before-after-compare {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 16px;
        background: linear-gradient(135deg, #eff3ff 0%, #dfe8ff 100%);
        cursor: ew-resize;
        touch-action: none;
      }

      .before-after-compare:focus-visible {
        outline: 2px solid var(--soft-ink);
        outline-offset: 2px;
      }

      .compare-image {
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .compare-base-image {
        position: relative;
        width: 100%;
        height: auto;
        display: block;
      }

      .compare-overlay-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        clip-path: inset(0 50% 0 0);
      }

      .compare-base-image.is-split {
        aspect-ratio: var(--compare-aspect, 3 / 2);
        background-image: var(--split-source);
        background-size: 100% 200%;
        background-position: center bottom;
        background-repeat: no-repeat;
      }

      .compare-overlay-image.is-split {
        background-image: var(--split-source);
        background-size: 100% 200%;
        background-position: center top;
        background-repeat: no-repeat;
      }

      .compare-divider {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 1px rgba(49, 63, 141, 0.12);
        transform: translateX(-50%);
      }

      .compare-handle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(49, 63, 141, 0.18);
        color: var(--logo-ink);
        font-size: 1rem;
        font-weight: 700;
      }

      .compare-label {
        position: absolute;
        top: 12px;
        z-index: 2;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(27, 42, 112, 0.78);
        color: #ffffff;
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      .compare-label-before {
        left: 12px;
      }

      .compare-label-after {
        right: 12px;
      }

      .compare-hint {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        z-index: 2;
        margin: 0;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: #243378;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }

      .before-after-compare.is-dragging .compare-handle {
        box-shadow: 0 0 0 4px rgba(103, 128, 245, 0.18);
      }

      .case-caption {
        margin: 0;
        padding: 28px 30px;
        color: var(--logo-ink);
        font-family: "Paperlogy", "Nunito Sans", "Segoe UI", sans-serif;
        font-size: clamp(1.05rem, 1.5vw, 1.34rem);
        font-weight: 600;
        line-height: 1.78;
        text-align: left;
        word-break: keep-all;
      }

      .bottom-cta {
        margin-top: 34px;
        display: flex;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        min-height: 48px;
        padding: 14px 22px;
        border: 1px solid transparent;
        border-radius: 999px;
        color: var(--logo-ink);
        background: var(--amber);
        box-shadow: 0 12px 28px rgba(27, 39, 35, 0.12);
        font-family: "Paperlogy", "Nunito Sans", "Segoe UI", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        transition: 180ms ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 820px) {
        .case-card-featured {
          width: 100%;
          margin: 0 auto;
          grid-template-columns: 1fr;
        }

        .case-card-compare {
          width: 100%;
        }

        .case-card-featured img {
          height: auto;
        }

        .case-caption {
          text-align: center;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(560px, 92vw);
        }

        .logo-img {
          max-width: min(360px, 78vw);
        }

        .case-card {
          width: 100%;
          border-radius: 14px;
        }

        .case-caption {
          padding: 16px 16px 18px;
          font-size: 0.98rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/korean" aria-label="Lofi Dental Korean home">
          <img src="assets/한글로고.png" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-back">
          <a href="/korean" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 18 9 12l6-6" />
            </svg>
          </a>
        </nav>
      </header>

      <main>
        <section class="case-grid" aria-label="비포&애프터">
          <figure class="case-card case-card-compare">
            <div
              class="before-after-compare"
              tabindex="0"
              data-start="50"
              aria-label="라미네이트 치료 전후 사례 1 비교"
              style="--split-source: url('assets/before-after/case-01.jpg'); --compare-aspect: 1535 / 442;"
            >
              <div
                class="compare-image compare-base-image is-split"
                role="img"
                aria-label="라미네이트 치료 후 이미지"
              ></div>
              <div
                class="compare-image compare-overlay-image is-split"
                role="img"
                aria-label="라미네이트 치료 전 이미지"
              ></div>
              <div class="compare-divider" aria-hidden="true">
                <span class="compare-handle">↔</span>
              </div>
              <span class="compare-label compare-label-before">BEFORE</span>
              <span class="compare-label compare-label-after">AFTER</span>
              <p class="compare-hint" aria-hidden="true">좌우로 드래그해 보세요</p>
            </div>
            <figcaption class="case-caption">
              “최대한 안건드리고 못생긴 부분만 좀 개선됐으면 좋겠어요”
            </figcaption>
          </figure>
          <figure class="case-card case-card-compare">
            <div
              class="before-after-compare"
              tabindex="0"
              data-start="50"
              aria-label="라미네이트 치료 전후 사례 2 비교"
              style="--split-source: url('assets/before-after/case-02.jpg'); --compare-aspect: 575 / 243;"
            >
              <div
                class="compare-image compare-base-image is-split"
                role="img"
                aria-label="라미네이트 치료 후 이미지"
              ></div>
              <div
                class="compare-image compare-overlay-image is-split"
                role="img"
                aria-label="라미네이트 치료 전 이미지"
              ></div>
              <div class="compare-divider" aria-hidden="true">
                <span class="compare-handle">↔</span>
              </div>
              <span class="compare-label compare-label-before">BEFORE</span>
              <span class="compare-label compare-label-after">AFTER</span>
              <p class="compare-hint" aria-hidden="true">좌우로 드래그해 보세요</p>
            </div>
            <figcaption class="case-caption">
              "친구들이 라미네이트가 너무 가짜 같대요 ㅠㅠ 자연스럽게 해주세요!"
            </figcaption>
          </figure>
          <figure class="case-card case-card-compare">
            <div
              class="before-after-compare"
              tabindex="0"
              data-start="54"
              aria-label="이영준 라미 비포 애프터 비교"
            >
              <img
                class="compare-image compare-base-image"
                src="assets/before-after/이영준 라미 애프터 3뷰 복사.png"
                alt="이영준 라미네이트 치료 후 이미지"
              />
              <img
                class="compare-image compare-overlay-image"
                src="assets/before-after/이영준 라미 비포 3뷰 복사.png"
                alt="이영준 라미네이트 치료 전 이미지"
              />
              <div class="compare-divider" aria-hidden="true">
                <span class="compare-handle">↔</span>
              </div>
              <span class="compare-label compare-label-before">BEFORE</span>
              <span class="compare-label compare-label-after">AFTER</span>
              <p class="compare-hint" aria-hidden="true">좌우로 드래그해 보세요</p>
            </div>
            <figcaption class="case-caption">
              "치아가 삐뚤빼뚤한데, 교정은 너무 부담스러워요."
            </figcaption>
          </figure>
        </section>
        <div class="bottom-cta">
          <a class="btn" href="/reservation/?lang=ko">예약하기</a>
        </div>
      </main>
    </div>
    <script>
      (function () {
        const components = document.querySelectorAll(".before-after-compare");
        const searchParams = new URLSearchParams(window.location.search);
        const isPlayMode = searchParams.get("play") === "1";

        const getClientX = (event) => {
          if (event.touches && event.touches.length > 0) return event.touches[0].clientX;
          if (event.changedTouches && event.changedTouches.length > 0) return event.changedTouches[0].clientX;
          return event.clientX;
        };

        components.forEach((compare) => {
          const overlayImage = compare.querySelector(".compare-overlay-image");
          const divider = compare.querySelector(".compare-divider");
          let isDragging = false;

          const applyPercent = (percent) => {
            const clamped = Math.min(100, Math.max(0, percent));
            overlayImage.style.clipPath = `inset(0 ${100 - clamped}% 0 0)`;
            divider.style.left = `${clamped}%`;
          };

          const setSplit = (clientX) => {
            const rect = compare.getBoundingClientRect();
            if (!rect.width) return;
            const ratio = (clientX - rect.left) / rect.width;
            applyPercent(Math.min(1, Math.max(0, ratio)) * 100);
          };

          const initial = Number(compare.dataset.start);
          const startPercent = Number.isFinite(initial) ? Math.min(100, Math.max(0, initial)) : 50;
          applyPercent(startPercent);

          compare.addEventListener("mousedown", (event) => {
            isDragging = true;
            compare.classList.add("is-dragging");
            setSplit(getClientX(event));
          });

          window.addEventListener("mousemove", (event) => {
            if (!isDragging) return;
            setSplit(getClientX(event));
          });

          window.addEventListener("mouseup", () => {
            if (!isDragging) return;
            isDragging = false;
            compare.classList.remove("is-dragging");
          });

          compare.addEventListener("touchstart", (event) => {
            isDragging = true;
            compare.classList.add("is-dragging");
            setSplit(getClientX(event));
          }, { passive: true });

          compare.addEventListener("touchmove", (event) => {
            if (!isDragging) return;
            event.preventDefault();
            setSplit(getClientX(event));
          }, { passive: false });

          compare.addEventListener("touchend", () => {
            if (!isDragging) return;
            isDragging = false;
            compare.classList.remove("is-dragging");
          });

          compare.addEventListener("keydown", (event) => {
            if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;
            event.preventDefault();
            const currentInset = Number((overlayImage.style.clipPath.match(/inset\(0\s+([0-9.]+)%/) || [])[1]);
            const current = Number.isFinite(currentInset) ? 100 - currentInset : 50;
            const next = event.key === "ArrowLeft" ? current - 3 : current + 3;
            applyPercent(next);
          });

          if (isPlayMode) {
            // In play mode, animate once from BEFORE-only (100) to AFTER-only (0).
            const durationMs = 52000;
            const startAt = performance.now();
            applyPercent(100);
            const tick = (now) => {
              const progress = Math.min(1, (now - startAt) / durationMs);
              applyPercent(100 - progress * 100);
              if (progress < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          }
        });
      })();
    </script>
  </body>
</html>
