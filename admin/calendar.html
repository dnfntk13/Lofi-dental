<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation Calendar | lofi dental admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.22);
        --card: rgba(255, 255, 255, 0.94);
        --mint: #e6d5f5;
        --amber: #dcc8ed;
        --accent: #5b3d8f;
        --accent-light: rgba(91, 61, 143, 0.08);
        --dot: #7c55b8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(220, 200, 237, 0.66), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(230, 213, 245, 0.72), transparent 46%),
          linear-gradient(170deg, var(--bg-cream) 0%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1200px, 94vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }

      .logo-img {
        max-width: 340px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .nav-links {
        margin-left: auto;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .nav-link {
        text-decoration: none;
        color: var(--soft-ink);
        font-size: 0.92rem;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid var(--line);
        transition: 180ms ease;
        white-space: nowrap;
        background: rgba(255,255,255,0.7);
      }

      .nav-link:hover { background: var(--mint); transform: translateY(-1px); }
      .nav-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }

      .cal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .cal-title {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.8rem, 3.5vw, 2.8rem);
        font-weight: 600;
        line-height: 1;
      }

      .cal-nav { display: flex; align-items: center; gap: 8px; }

      .cal-nav-btn {
        background: rgba(255,255,255,0.9);
        border: 1px solid var(--line);
        border-radius: 999px;
        width: 38px; height: 38px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--ink);
        transition: 150ms ease; font-size: 1.1rem;
      }

      .cal-nav-btn:hover { background: var(--mint); transform: translateY(-1px); }

      .cal-month-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.55rem; font-weight: 600;
        min-width: 200px; text-align: center;
      }

      .btn-today {
        background: rgba(255,255,255,0.9);
        border: 1px solid var(--line);
        border-radius: 999px; padding: 8px 16px;
        font-family: inherit; font-size: 0.88rem; font-weight: 700;
        cursor: pointer; color: var(--ink); transition: 150ms ease;
      }

      .btn-today:hover { background: var(--mint); }

      .cal-wrap {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(27,39,35,0.07);
      }

      .cal-weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        background: var(--accent-light);
        border-bottom: 1px solid var(--line);
      }

      .cal-weekday {
        padding: 10px 6px; text-align: center;
        font-size: 0.78rem; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--soft-ink);
      }

      .cal-weekday.sun { color: #c0392b; }
      .cal-weekday.sat { color: var(--accent); }

      .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

      .cal-cell {
        min-height: 110px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 8px; cursor: default;
        transition: background 120ms ease;
        position: relative;
      }

      .cal-cell:nth-child(7n) { border-right: none; }
      .cal-cell.has-events { cursor: pointer; }
      .cal-cell.has-events:hover { background: var(--accent-light); }
      .cal-cell.other-month { background: rgba(240, 243, 255, 0.5); }
      .cal-cell.other-month .day-num { opacity: 0.35; }

      .cal-cell.today .day-num {
        background: var(--accent); color: #fff;
        border-radius: 999px; width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
      }

      .cal-cell.sunday .day-num { color: #c0392b; }
      .cal-cell.saturday .day-num { color: var(--accent); }

      .day-num {
        font-size: 0.88rem; font-weight: 700; line-height: 1;
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
      }

      .day-events { margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }

      .event-chip {
        background: var(--accent); color: #fff;
        border-radius: 6px; padding: 3px 7px;
        font-size: 0.74rem; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        line-height: 1.4;
      }

      .event-more { font-size: 0.72rem; color: var(--soft-ink); font-weight: 600; padding: 2px 4px; }

      .detail-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(31, 45, 102, 0.25);
        backdrop-filter: blur(3px);
        z-index: 100;
        align-items: center; justify-content: center;
        padding: 16px;
      }

      .detail-overlay.open { display: flex; }

      .detail-panel {
        background: #fff; border-radius: 24px; padding: 32px;
        width: min(560px, 100%); max-height: 82vh; overflow-y: auto;
        box-shadow: 0 24px 60px rgba(31, 45, 102, 0.18);
        position: relative;
      }

      .detail-close {
        position: absolute; top: 18px; right: 18px;
        background: rgba(240,240,250,0.9); border: none;
        border-radius: 999px; width: 34px; height: 34px;
        cursor: pointer; font-size: 1.1rem;
        display: flex; align-items: center; justify-content: center;
        color: var(--ink); transition: 150ms;
      }

      .detail-close:hover { background: var(--mint); }

      .detail-date {
        margin: 0 0 20px;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.7rem; font-weight: 600;
      }

      .detail-list { display: grid; gap: 14px; }

      .detail-item {
        border: 1px solid var(--line); border-radius: 16px;
        padding: 16px; background: var(--bg-cream);
      }

      .detail-row {
        display: flex; gap: 8px; align-items: center;
        flex-wrap: wrap; margin-bottom: 8px;
      }

      .detail-time {
        background: var(--accent); color: #fff;
        border-radius: 999px; padding: 4px 12px;
        font-size: 0.85rem; font-weight: 700;
      }

      .detail-email { color: var(--soft-ink); font-size: 0.88rem; font-weight: 600; }
      .detail-received { color: #999; font-size: 0.78rem; margin-left: auto; }

      .detail-concerns {
        margin: 0; font-size: 0.92rem; line-height: 1.65;
        color: var(--ink); white-space: pre-wrap;
      }

      .legend {
        margin-top: 16px; display: flex; align-items: center;
        gap: 10px; font-size: 0.82rem; color: var(--soft-ink);
      }

      .legend-dot {
        width: 12px; height: 12px; border-radius: 3px;
        background: var(--accent); flex-shrink: 0;
      }

      .state-msg {
        padding: 48px 0; text-align: center;
        color: var(--soft-ink); font-size: 1rem;
      }

      @media (max-width: 680px) {
        .cal-cell { min-height: 70px; padding: 4px; }
        .event-chip { font-size: 0.68rem; padding: 2px 5px; }
        .cal-weekday { font-size: 0.7rem; padding: 8px 2px; }
        .detail-panel { padding: 22px; }
      }

      @media (max-width: 420px) {
        .cal-cell { min-height: 52px; }
        .day-events { display: none; }
        .cal-cell.has-events::after {
          content: '';
          position: absolute; bottom: 6px; left: 50%;
          transform: translateX(-50%);
          width: 6px; height: 6px; border-radius: 999px;
          background: var(--accent);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/english" aria-label="Lofi Dental home">
          <img src="../assets/영문로고.png" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-links" aria-label="Admin navigation">
          <a class="nav-link" href="/admin/messages">Inbox list</a>
          <a class="nav-link active" href="/admin/calendar">Calendar</a>
          <a class="nav-link" href="/admin/patients">Patients</a>
          <a class="nav-link" href="/admin">Admin home</a>
        </nav>
      </header>

      <div class="cal-header">
        <h1 class="cal-title">Reservation Calendar</h1>
        <div class="cal-nav">
          <button class="cal-nav-btn" id="prevBtn" aria-label="Previous month">&#8249;</button>
          <span class="cal-month-label" id="monthLabel"></span>
          <button class="cal-nav-btn" id="nextBtn" aria-label="Next month">&#8250;</button>
          <button class="btn-today" id="todayBtn">Today</button>
        </div>
      </div>

      <div id="statusMsg" class="state-msg" style="display:none"></div>

      <div class="cal-wrap" id="calWrap">
        <div class="cal-weekdays">
          <div class="cal-weekday sun">Sun</div>
          <div class="cal-weekday">Mon</div>
          <div class="cal-weekday">Tue</div>
          <div class="cal-weekday">Wed</div>
          <div class="cal-weekday">Thu</div>
          <div class="cal-weekday">Fri</div>
          <div class="cal-weekday sat">Sat</div>
        </div>
        <div class="cal-grid" id="calGrid" aria-label="Calendar"></div>
      </div>

      <div class="legend">
        <span class="legend-dot"></span>
        <span>Reservation received</span>
      </div>
    </div>

    <div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailDate">
      <div class="detail-panel">
        <button class="detail-close" id="detailClose" aria-label="Close">&#x2715;</button>
        <h2 class="detail-date" id="detailDate"></h2>
        <div class="detail-list" id="detailList"></div>
      </div>
    </div>

    <script>
      function escHtml(v) {
        return String(v || "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function fmtReceived(iso) {
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return new Intl.DateTimeFormat("en-US", {
          month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit",
        }).format(d);
      }

      const today = new Date();
      let viewYear = today.getFullYear();
      let viewMonth = today.getMonth();
      let allReservations = [];

      async function loadReservations() {
        const statusMsg = document.getElementById("statusMsg");
        statusMsg.style.display = "block";
        statusMsg.textContent = "Loading reservations\u2026";
        try {
          const res = await fetch("/api/admin/messages", { headers: { Accept: "application/json" } });
          if (!res.ok) { statusMsg.textContent = "Failed to load reservations."; return; }
          const data = await res.json();
          allReservations = Array.isArray(data.messages) ? data.messages : [];
          statusMsg.style.display = "none";
          renderCalendar();
        } catch {
          statusMsg.textContent = "Failed to load reservations.";
        }
      }

      function normalizeDate(raw) {
        if (!raw) return null;
        const iso = /^\d{4}-\d{1,2}-\d{1,2}$/.test(raw.trim()) ? raw.trim() : null;
        if (iso) {
          const parts = iso.split("-");
          return `${parts[0]}-${parts[1].padStart(2,"0")}-${parts[2].padStart(2,"0")}`;
        }
        const d = new Date(raw);
        if (isNaN(d)) return null;
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      }

      function buildEventMap() {
        const map = {};
        for (const r of allReservations) {
          const key = normalizeDate(r.date);
          if (!key) continue;
          if (!map[key]) map[key] = [];
          map[key].push(r);
        }
        return map;
      }

      function todayKey() {
        return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
      }

      function renderCalendar() {
        const monthLabel = document.getElementById("monthLabel");
        const calGrid = document.getElementById("calGrid");
        monthLabel.textContent = new Intl.DateTimeFormat("en-US", { month: "long", year: "numeric" })
          .format(new Date(viewYear, viewMonth, 1));

        const eventMap = buildEventMap();
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay = new Date(viewYear, viewMonth + 1, 0);
        const startPad = firstDay.getDay();
        const endPad = 6 - lastDay.getDay();
        const cells = [];

        for (let i = startPad - 1; i >= 0; i--) cells.push({ date: new Date(viewYear, viewMonth, -i), current: false });
        for (let d = 1; d <= lastDay.getDate(); d++) cells.push({ date: new Date(viewYear, viewMonth, d), current: true });
        for (let i = 1; i <= endPad; i++) cells.push({ date: new Date(viewYear, viewMonth + 1, i), current: false });

        calGrid.innerHTML = cells.map((cell) => {
          const y = cell.date.getFullYear();
          const m = String(cell.date.getMonth() + 1).padStart(2, "0");
          const dd = String(cell.date.getDate()).padStart(2, "0");
          const key = `${y}-${m}-${dd}`;
          const events = eventMap[key] || [];
          const isToday = key === todayKey();
          const dow = cell.date.getDay();

          const classes = ["cal-cell",
            !cell.current ? "other-month" : "",
            isToday ? "today" : "",
            dow === 0 ? "sunday" : "",
            dow === 6 ? "saturday" : "",
            events.length > 0 ? "has-events" : "",
          ].filter(Boolean).join(" ");

          const eventsHtml = events.length > 0
            ? `<div class="day-events">
                ${events.slice(0,2).map(e => `<div class="event-chip">${escHtml(e.time)} ${escHtml(e.email.split("@")[0])}</div>`).join("")}
                ${events.length > 2 ? `<div class="event-more">+${events.length - 2} more</div>` : ""}
              </div>` : "";

          const clickAttr = events.length > 0
            ? `onclick="openDetail('${key}')" role="button" tabindex="0" aria-label="${events.length} reservation${events.length>1?"s":""} on ${key}"` : "";

          return `<div class="${classes}" data-date="${key}" ${clickAttr}><div class="day-num">${cell.date.getDate()}</div>${eventsHtml}</div>`;
        }).join("");

        calGrid.querySelectorAll(".has-events").forEach(cell => {
          cell.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDetail(cell.dataset.date); }
          });
        });
      }

      function openDetail(dateKey) {
        const [y, m, d] = dateKey.split("-").map(Number);
        document.getElementById("detailDate").textContent = new Intl.DateTimeFormat("en-US", {
          weekday: "long", year: "numeric", month: "long", day: "numeric",
        }).format(new Date(y, m - 1, d));

        renderDetailList(dateKey);

        document.getElementById("detailOverlay").classList.add("open");
        document.getElementById("detailClose").focus();
      }

      function renderDetailList(dateKey) {
        const events = allReservations
          .filter(r => normalizeDate(r.date) === dateKey)
          .sort((a, b) => (a.time || "").localeCompare(b.time || ""));

        document.getElementById("detailList").innerHTML = events.map(r => `
          <article class="detail-item" id="cal-res-${escHtml(r.id)}">
            <div class="detail-row">
              <span class="detail-time">${escHtml(r.time)}</span>
              <span class="detail-email">${escHtml(r.email)}</span>
              <span class="detail-received">Received: ${escHtml(fmtReceived(r.createdAt))}</span>
              <button onclick="deleteReservation('${escHtml(r.id)}', '${escHtml(dateKey)}')" style="margin-left:auto;background:#ffeaea;color:#c0392b;border:1px solid #f5c6c6;border-radius:999px;padding:3px 10px;font:inherit;font-size:0.78rem;font-weight:700;cursor:pointer;">&times; Delete</button>
            </div>
            <p class="detail-concerns">${escHtml(r.concerns)}</p>
          </article>`).join("");

        if (!events.length) closeDetail();
      }

      async function deleteReservation(id, dateKey) {
        if (!confirm("Delete this reservation?")) return;
        try {
          const res = await fetch(`/api/admin/reservations/${encodeURIComponent(id)}`, { method: "DELETE" });
          if (res.ok) {
            allReservations = allReservations.filter(r => r.id !== id);
            renderCalendar();
            renderDetailList(dateKey);
          } else {
            alert("Failed to delete.");
          }
        } catch {
          alert("Failed to delete.");
        }
      }

      function closeDetail() { document.getElementById("detailOverlay").classList.remove("open"); }

      document.getElementById("detailClose").addEventListener("click", closeDetail);
      document.getElementById("detailOverlay").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeDetail(); });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDetail(); });

      document.getElementById("prevBtn").addEventListener("click", () => {
        viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar();
      });
      document.getElementById("nextBtn").addEventListener("click", () => {
        viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar();
      });
      document.getElementById("todayBtn").addEventListener("click", () => {
        viewYear = today.getFullYear(); viewMonth = today.getMonth(); renderCalendar();
      });

      loadReservations();
    </script>
  </body>
</html>
