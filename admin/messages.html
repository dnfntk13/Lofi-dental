<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');

    <title>Admin Inbox | lofi dental</title>
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.16);
        --card: rgba(255, 255, 255, 0.95);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(90, 111, 218, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(103, 128, 245, 0.18), transparent 30%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      .wrap {
        width: min(1000px, 100%);
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 22px;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .logo-img {
        max-width: 300px;
        width: min(300px, 56vw);
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.4vw, 2.1rem);
      }

      .muted {
        margin: 0;
        color: var(--soft);
      }

      .btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 16px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .list {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
        padding: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
        background: #fff;
        color: var(--soft);
        font-size: 0.9rem;
      }

      .body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.6;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(31, 45, 102, 0.5);
        z-index: 1000;
        overflow-y: auto;
        padding: 20px;
      }

      .modal.open { display: flex; align-items: center; justify-content: center; }

      .modal-content {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        max-width: 600px;
        width: 100%;
        max-height: 85vh;
        overflow-y: auto;
        padding: 24px;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
      }

      .modal-header h2 {
        margin: 0;
        font-size: 1.3rem;
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--soft);
      }

      .message-item {
        margin-bottom: 8px;
        padding: 12px;
        background: #f8f9ff;
        border: 1px solid #dbe5ff;
        border-radius: 16px;
        max-width: 82%;
      }

      .thread-messages {
        display: grid;
        gap: 10px;
      }

      .message-row {
        display: flex;
      }

      .message-row.left {
        justify-content: flex-start;
      }

      .message-row.right {
        justify-content: flex-end;
      }

      .message-row.center {
        justify-content: center;
      }

      .message-item.auto-reply {
        border-color: #9fd8b2;
        background: #f1f8f5;
      }

      .message-item.admin-reply {
        border-color: #93b9f2;
        background: #edf4ff;
      }

      .message-item.customer-reply {
        border-color: #b6c7f8;
        background: #ffffff;
      }

      .message-item.reservation {
        border-color: #b6c7f8;
        background: #f7f9ff;
      }

      .message-type {
        font-size: 0.75rem;
        font-weight: 700;
        color: #fff;
        background: var(--soft);
        padding: 2px 8px;
        border-radius: 999px;
        display: inline-block;
        margin-bottom: 6px;
      }

      .message-item.auto-reply .message-type {
        background: #2e7d32;
      }

      .message-item.admin-reply .message-type {
        background: #1565c0;
      }

      .message-date {
        font-size: 0.85rem;
        color: var(--soft);
        margin-bottom: 8px;
      }

      .message-row.right .message-date {
        text-align: right;
      }

      .message-row.right .message-type {
        margin-left: auto;
      }

      .message-text {
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .reply-composer {
        margin-top: 16px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }

      .reply-label {
        display: block;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--soft);
        margin-bottom: 6px;
      }

      .reply-input {
        width: 100%;
        min-height: 92px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        font-size: 0.95rem;
        color: var(--ink);
        background: #fff;
        resize: vertical;
      }

      .reply-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 8px;
      }

      .reply-send {
        border: 1px solid #1565c0;
        border-radius: 999px;
        background: #1565c0;
        color: #fff;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 700;
        padding: 8px 14px;
        cursor: pointer;
      }

      .reply-send:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .reply-status {
        min-height: 1em;
        font-size: 0.82rem;
        color: var(--soft);
      }

      .context-menu {
        display: none;
        position: absolute;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(31, 45, 102, 0.15);
        z-index: 2000;
        min-width: 160px;
        top: 0;
        left: 0;
      }

      .context-menu.visible {
        display: block;
      }

      .context-menu-item {
        padding: 8px 12px;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font: inherit;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .context-menu-item:hover {
        background: #f0f2ff;
      }

      .context-menu-item:first-child {
        border-radius: 8px 8px 0 0;
      }

      .context-menu-item:last-child {
        border-radius: 0 0 8px 8px;
      }

      .context-menu-item.danger {
        color: #c0392b;
      }

      .context-menu-item.danger:hover {
        background: #ffeaea;
      }
    </style>
  </head>
  <body>
    <div class="modal" id="messageModal">
      <div class="modal-content" style="position:relative;">
        <div class="modal-header">
          <h2>Email Thread</h2>
          <button class="modal-close" type="button" onclick="closeMessageModal()">×</button>
        </div>
        <div id="threadContent"></div>
        <div class="reply-composer">
          <label class="reply-label" for="replyInput">Reply to patient</label>
          <textarea id="replyInput" class="reply-input" placeholder="Type your message and send to patient..."></textarea>
          <div class="reply-row">
            <span id="replyStatus" class="reply-status"></span>
            <button id="sendReplyButton" class="reply-send" type="button">Send Reply</button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="context-menu" id="contextMenu">
      <button class="context-menu-item" onclick="copyMessageText()">📋 Copy</button>
      <button class="context-menu-item" onclick="replyToMessage()">↩️ Reply</button>
      <button class="context-menu-item" onclick="forwardMessage()">⤴️ Forward</button>
      <button class="context-menu-item danger" onclick="deleteMessageThread()">🗑️ Delete</button>
    </div>
    
    <main class="wrap">
      <header class="topbar">
        <a class="logo-link" href="/english" aria-label="Lofi Dental English home">
          <img src="../assets/영문로고.png" alt="lofi dental" class="logo-img" />
        </a>
      </header>
      <div class="header">
        <h1>Reservation Inbox</h1>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <a href="/admin/calendar" style="text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:10px 16px;background:#5b3d8f;color:#fff;font:inherit;font-size:0.9rem;font-weight:700;">&#128197; Calendar</a>
          <a href="/admin/patients" style="text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:10px 16px;background:#2e7d32;color:#fff;font:inherit;font-size:0.9rem;font-weight:700;">&#128101; Patients</a>
          <button type="button" class="btn" id="refreshButton">Refresh</button>
        </div>
      </div>
      <p class="muted">Admin only</p>
      <section id="inbox" class="list" aria-live="polite"></section>
    </main>

    <script>
      const inbox = document.getElementById("inbox");
      const refreshButton = document.getElementById("refreshButton");
      const messageModal = document.getElementById("messageModal");
      const threadContent = document.getElementById("threadContent");
      const replyInput = document.getElementById("replyInput");
      const replyStatus = document.getElementById("replyStatus");
      const sendReplyButton = document.getElementById("sendReplyButton");

      function formatDateTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return new Intl.DateTimeFormat("en-US", {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function renderAttachments(attachments) {
        if (!Array.isArray(attachments) || !attachments.length) return "";
        return attachments.map((attachment) => {
          const type = String(attachment?.type || "").toLowerCase();
          const dataUrl = String(attachment?.dataUrl || "");
          if (!type.startsWith("image/") || !dataUrl.startsWith("data:image/")) return "";
          return `<a href="${escapeHtml(dataUrl)}" target="_blank" rel="noopener"><img src="${escapeHtml(dataUrl)}" alt="${escapeHtml(attachment.name || "Attached photo")}" style="display:block;max-width:220px;width:100%;margin-top:10px;border-radius:12px;border:1px solid var(--line);" /></a>`;
        }).join("");
      }

      let currentMessageData = null;
      let currentThreadEmail = "";
      let currentThreadReservationId = null;
      const contextMenu = document.getElementById("contextMenu");

      function showContextMenu(event, email, msgIndex, container) {
        event.preventDefault();
        currentMessageData = { email, msgIndex };
        
        // container 기준으로 좌표 계산
        const containerRect = container.getBoundingClientRect();
        const x = event.clientX - containerRect.left;
        const y = event.clientY - containerRect.top;
        
        contextMenu.style.top = Math.max(0, y) + "px";
        contextMenu.style.left = Math.max(0, x) + "px";
        contextMenu.classList.add("visible");
      }

      function hideContextMenu() {
        contextMenu.classList.remove("visible");
        currentMessageData = null;
      }

      function setReplyStatus(message, isError = false) {
        replyStatus.textContent = message || "";
        replyStatus.style.color = isError ? "#c0392b" : "var(--soft)";
      }

      function copyMessageText() {
        if (!currentMessageData) return;
        
        const msgElement = document.querySelector(`[data-msg-index="${currentMessageData.msgIndex}"]`);
        if (!msgElement) return;
        
        const textElement = msgElement.querySelector(".message-text");
        const text = textElement?.textContent || "";
        
        navigator.clipboard.writeText(text).then(() => {
          alert("✅ Message copied to clipboard");
          hideContextMenu();
        }).catch(() => {
          alert("❌ Failed to copy message");
        });
      }

      function replyToMessage() {
        if (!currentMessageData) return;
        
        const msgElement = document.querySelector(`[data-msg-index="${currentMessageData.msgIndex}"]`);
        if (!msgElement) return;
        
        const textElement = msgElement.querySelector(".message-text");
        const text = textElement?.textContent || "";

        const replyText = `\n\n---\nOn ${new Date().toLocaleString()}, patient wrote:\n${text}\n---\n`;
        replyInput.value = `${replyInput.value || ""}${replyText}`.trimStart();
        replyInput.focus();
        hideContextMenu();
      }

      function forwardMessage() {
        if (!currentMessageData) return;
        
        const msgElement = document.querySelector(`[data-msg-index="${currentMessageData.msgIndex}"]`);
        if (!msgElement) return;
        
        const typeElement = msgElement.querySelector(".message-type");
        const typeText = typeElement?.textContent || "";
        const dateElement = msgElement.querySelector(".message-date");
        const dateText = dateElement?.textContent || "";
        const textElement = msgElement.querySelector(".message-text");
        const text = textElement?.textContent || "";
        
        const forwardText = `
---------- Forwarded Message ----------
Type: ${typeText}
Date: ${dateText}

${text}
        `.trim();
        
        navigator.clipboard.writeText(forwardText).then(() => {
          alert("✅ Message forwarded. You can now paste it in your email client.");
          hideContextMenu();
        }).catch(() => {
          alert("❌ Failed to copy forwarded message");
        });
      }

      function deleteMessageThread() {
        if (!currentMessageData) return;
        
        if (confirm("Are you sure you want to delete this entire thread?")) {
          // 구현 예정: 서버에 스레드 삭제 요청
          alert("⚠️ Delete functionality coming soon!");
          hideContextMenu();
        }
      }

      function closeMessageModal() {
        messageModal.classList.remove("open");
        threadContent.innerHTML = "";
        currentThreadEmail = "";
        currentThreadReservationId = null;
        replyInput.value = "";
        setReplyStatus("");
        sendReplyButton.disabled = false;
      }

      async function openMessageModal(email) {
        currentThreadEmail = String(email || "").trim();
        messageModal.classList.add("open");
        threadContent.innerHTML = '<p style="color: var(--soft);">Loading messages...</p>';
        setReplyStatus("");
        sendReplyButton.disabled = false;

        try {
          const apiUrl = new URL(`/api/admin/email-thread/${encodeURIComponent(email)}`, window.location.origin);
          const authHeaders = { Accept: "application/json" };
          const authUser = window.location.username || "";
          const authPass = window.location.password || "";

          if (authUser || authPass) {
            authHeaders.Authorization = `Basic ${btoa(`${decodeURIComponent(authUser)}:${decodeURIComponent(authPass)}`)}`;
          }

          const response = await fetch(apiUrl.toString(), { headers: authHeaders });

          if (!response.ok) {
            threadContent.innerHTML = '<p style="color: #c0392b;">Failed to load messages.</p>';
            return;
          }

          const data = await response.json();
          currentThreadReservationId = data?.reservationId || null;
          renderThread(data);
        } catch (error) {
          console.error("Error loading thread:", error);
          threadContent.innerHTML = '<p style="color: #c0392b;">Failed to load messages.</p>';
        }
      }

      async function sendThreadReply() {
        const email = String(currentThreadEmail || "").trim();
        const content = String(replyInput.value || "").trim();

        if (!email) {
          setReplyStatus("Open a thread first.", true);
          return;
        }

        if (!content) {
          setReplyStatus("Type a message to send.", true);
          return;
        }

        sendReplyButton.disabled = true;
        setReplyStatus("Sending...");

        try {
          const apiUrl = new URL(`/api/admin/email-thread/${encodeURIComponent(email)}/reply`, window.location.origin);
          const response = await fetch(apiUrl.toString(), {
            method: "POST",
            headers: {
              "Accept": "application/json",
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              reservationId: currentThreadReservationId,
              content,
            }),
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            setReplyStatus(data?.message || "Failed to send reply.", true);
            sendReplyButton.disabled = false;
            return;
          }

          replyInput.value = "";
          setReplyStatus("Reply sent.");
          await openMessageModal(email);
        } catch (error) {
          console.error("Failed to send thread reply", error);
          setReplyStatus("Failed to send reply.", true);
        } finally {
          sendReplyButton.disabled = false;
        }
      }

      function renderThread(data) {
        const { email, thread = [] } = data;
        let html = `<p style="font-size: 0.9rem; color: var(--soft); margin-bottom: 16px;"><strong>Email:</strong> ${escapeHtml(email)}</p>`;

        if (thread.length === 0) {
          html += '<p style="color: var(--soft);">No messages yet.</p>';
          threadContent.innerHTML = html;
          return;
        }

        html += '<div class="thread-messages">';

        thread.forEach((msg, index) => {
          const msgId = `msg-${index}`;
          let rowClass = "center";
          let cardClass = "message-item";
          let typeLabel = "MESSAGE";
          let dateLabel = "";

          if (msg.type === "reservation") {
            rowClass = "left";
            cardClass += " reservation";
            typeLabel = "PATIENT REQUEST";
            dateLabel = `📅 ${escapeHtml(msg.date)} at ${escapeHtml(msg.time)} | ${escapeHtml(formatDateTime(msg.createdAt))}`;
          } else if (msg.type === "auto-reply") {
            rowClass = "right";
            cardClass += " auto-reply";
            typeLabel = "LOFI AUTO REPLY";
            dateLabel = `🤖 ${escapeHtml(formatDateTime(msg.sentAt))}`;
          } else if (msg.type === "customer-reply") {
            rowClass = "left";
            cardClass += " customer-reply";
            typeLabel = "PATIENT";
            dateLabel = `💌 ${escapeHtml(formatDateTime(msg.receivedAt))}`;
          } else if (msg.type === "admin-reply") {
            rowClass = "right";
            cardClass += " admin-reply";
            typeLabel = "LOFI ADMIN";
            dateLabel = `📤 ${escapeHtml(formatDateTime(msg.sentAt))}`;
          }

          html += `
            <div class="message-row ${rowClass}">
              <div class="${cardClass}" id="${msgId}" data-msg-index="${index}" data-msg-type="${escapeHtml(msg.type || "")}">
                <div class="message-type">${typeLabel}</div>
                <div class="message-date">${dateLabel}</div>
                <div class="message-text">${escapeHtml(msg.content || msg.concerns || "")}</div>
                ${renderAttachments(msg.attachments)}
              </div>
            </div>
          `;
        });

        html += '</div>';

        threadContent.innerHTML = html;
      }

      function render(messages) {
        if (!messages.length) {
          inbox.innerHTML = '<article class="item"><p class="body">No messages yet.</p></article>';
          return;
        }

        inbox.innerHTML = messages
          .map((message) => {
            const safeEmail = escapeHtml(message.email);
            const safeConcerns = escapeHtml(message.concerns);
            
            // Build patient info from updated fields
            const patientInfo = [];
            if (message.name) patientInfo.push(`Name: ${escapeHtml(message.name)}`);
            if (message.visitingFrom) patientInfo.push(`Visiting from: ${escapeHtml(message.visitingFrom)}`);
            if (message.phone) patientInfo.push(`Phone: ${escapeHtml(message.phone)}`);
            const patientDetails = patientInfo.length ? patientInfo.join(", ") : safeConcerns;

            return `
              <article class="item" id="msg-${escapeHtml(message.id)}">
                <div class="meta">
                  <span class="chip">Date: ${escapeHtml(message.date)}</span>
                  <span class="chip">Time: ${escapeHtml(message.time)}</span>
                  ${safeEmail ? `<span class="chip">Email: ${safeEmail}</span>` : ""}
                  <span class="chip">Received: ${escapeHtml(formatDateTime(message.createdAt))}</span>
                  <button class="chip" style="background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9;cursor:pointer;font:inherit;font-size:0.85rem;font-weight:700;" onclick="openMessageModal('${escapeHtml(message.email)}')">💬 Messages</button>
                  <button class="chip" style="background:#ffeaea;color:#c0392b;border-color:#f5c6c6;cursor:pointer;font:inherit;font-size:0.85rem;font-weight:700;" onclick="deleteMessage('${escapeHtml(message.id)}')">&times; Delete</button>
                </div>
                <p class="body">${patientDetails}</p>
              </article>
            `;
          })
          .join("");
      }

      async function deleteMessage(id) {
        if (!confirm("Delete this reservation?")) return;
        try {
          const res = await fetch(`/api/admin/reservations/${encodeURIComponent(id)}`, { method: "DELETE" });
          if (res.ok) {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
          } else {
            alert("Failed to delete.");
          }
        } catch {
          alert("Failed to delete.");
        }
      }

      async function loadMessages() {
        inbox.innerHTML = '<article class="item"><p class="body">Loading...</p></article>';

        try {
          const apiUrl = new URL("/api/admin/messages", window.location.origin);
          const authHeaders = { Accept: "application/json" };
          const authUser = window.location.username || "";
          const authPass = window.location.password || "";

          if (authUser || authPass) {
            authHeaders.Authorization = `Basic ${btoa(`${decodeURIComponent(authUser)}:${decodeURIComponent(authPass)}`)}`;
          }

          const response = await fetch(apiUrl.toString(), {
            headers: authHeaders,
          });

          if (!response.ok) {
            inbox.innerHTML = '<article class="item"><p class="body">Failed to load messages.</p></article>';
            return;
          }

          const data = await response.json();
          render(Array.isArray(data.messages) ? data.messages : []);
        } catch {
          inbox.innerHTML = '<article class="item"><p class="body">Failed to load messages.</p></article>';
        }
      }

      refreshButton.addEventListener("click", loadMessages);
      sendReplyButton.addEventListener("click", sendThreadReply);
      replyInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendThreadReply();
        }
      });

      document.addEventListener("contextmenu", (e) => {
        const messageItem = e.target.closest(".message-item");
        if (messageItem && messageModal.classList.contains("open")) {
          e.preventDefault();
          e.stopPropagation();
          const msgIndex = messageItem.getAttribute("data-msg-index");
          showContextMenu(e, currentThreadEmail, parseInt(msgIndex, 10), threadContent);
        }
      }, true);

      document.addEventListener("click", hideContextMenu);
      loadMessages();
    </script>
  </body>
