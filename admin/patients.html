<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients | lofi dental admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.16);
        --card: rgba(255, 255, 255, 0.95);
        --accent: #5b3d8f;
        --green: #2e7d32;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(220, 200, 237, 0.66), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(230, 213, 245, 0.72), transparent 46%),
          linear-gradient(170deg, #f5f7ff 0%, #e7edff 100%);
      }

      .wrap { width: min(1100px, 94vw); margin: 0 auto; padding: 28px 0 60px; }

      .topbar {
        display: flex; align-items: center; gap: 18px;
        flex-wrap: wrap; margin-bottom: 32px;
      }

      .logo-img { max-width: 300px; width: min(300px, 56vw); height: auto; display: block; margin-left: -10px; }
      .logo-link { display: inline-block; line-height: 0; text-decoration: none; }

      .nav-links { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

      .nav-link {
        text-decoration: none; color: var(--soft); font-size: 0.92rem; font-weight: 600;
        padding: 8px 14px; border-radius: 6px; border: 1px solid var(--line);
        transition: 180ms ease; white-space: nowrap; background: rgba(255,255,255,0.7);
      }

      .nav-link:hover { background: #e6d5f5; transform: translateY(-1px); }
      .nav-link.active { background: var(--green); color: #fff; border-color: var(--green); }

      .header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
      }

      h1 { margin: 0; font-family: "Cormorant Garamond", serif; font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 600; }

      .subtitle { margin: 0 0 20px; color: var(--soft); font-size: 0.95rem; }

      .btn {
        border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px;
        background: #fff; color: var(--ink); font: inherit; font-weight: 700; cursor: pointer;
        transition: 150ms;
      }

      .btn:hover { background: #e6d5f5; }

      .danger-btn {
        border-color: rgba(176, 45, 45, 0.24);
        color: #a32626;
      }

      .danger-btn:hover { background: #fff0f0; }

      .search-bar {
        width: 100%; padding: 11px 16px;
        border: 1px solid var(--line); border-radius: 10px;
        font: inherit; font-size: 0.97rem; background: rgba(255,255,255,0.9);
        color: var(--ink); outline: none; margin-bottom: 18px;
        transition: border-color 150ms;
      }

      .search-bar:focus { border-color: var(--accent); }

      .list { display: grid; gap: 12px; }

      .patient-card {
        border: 1px solid var(--line); border-radius: 20px;
        background: var(--card); padding: 18px 20px;
        display: grid; grid-template-columns: 1fr auto;
        gap: 10px; align-items: start;
      }

      .patient-name {
        display: inline-flex; align-items: center; min-height: 34px;
        margin: 0 0 4px; padding: 5px 14px;
        border: 1px solid rgba(91,61,143,0.2); border-radius: 999px;
        background: rgba(255,255,255,0.86); color: var(--ink);
        font-size: 1.05rem; font-weight: 700;
        cursor: context-menu;
        transition: 150ms;
      }

      .patient-name:hover {
        border-color: rgba(91,61,143,0.42); color: var(--accent);
        background: #f8f4ff;
      }

      .patient-name.editing {
        cursor: text; outline: 2px solid rgba(91,61,143,0.22);
        background: #fff;
      }

      .name-context-menu {
        position: fixed; z-index: 1200; display: none;
        min-width: 120px; padding: 6px;
        border: 1px solid var(--line); border-radius: 10px;
        background: #fff; box-shadow: 0 14px 34px rgba(31, 45, 102, 0.18);
      }

      .name-context-menu.open { display: block; }

      .name-context-menu button {
        width: 100%; border: 0; border-radius: 7px; padding: 8px 10px;
        background: transparent; color: var(--ink); font: inherit;
        font-size: 0.9rem; font-weight: 800; text-align: left; cursor: pointer;
      }

      .name-context-menu button:hover { background: #f8f4ff; color: var(--accent); }

      .patient-name-row {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      }

      .patient-actions {
        display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      }

      .patient-meta {
        display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px;
      }

      .patient-details {
        margin-top: 12px; padding: 12px 14px; border: 1px solid var(--line);
        border-radius: 14px; background: rgba(248, 250, 255, 0.82);
        color: var(--ink); line-height: 1.55; white-space: pre-wrap;
      }

      .reservation-list {
        margin-top: 10px; display: grid; gap: 6px;
      }

      .reservation-row {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 8px 10px; border: 1px solid var(--line); border-radius: 10px;
        background: rgba(255,255,255,0.72); color: var(--soft); font-size: 0.86rem;
      }

      .reservation-row strong { color: var(--ink); }

      .detail-label {
        display: block; margin-bottom: 4px; color: var(--soft);
        font-size: 0.78rem; font-weight: 800; letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .chip {
        border: 1px solid var(--line); border-radius: 999px;
        padding: 5px 11px; background: #fff; color: var(--soft);
        font-size: 0.85rem;
      }

      .chip.phone { color: var(--green); border-color: rgba(46,125,50,0.3); background: #f0faf0; }
      .chip.email { color: var(--accent); border-color: rgba(91,61,143,0.3); background: #f8f4ff; }
      .chip.date { color: #666; }

      .message-icon {
        width: 34px; height: 34px; display: inline-grid; place-items: center;
        border: 1px solid rgba(91,61,143,0.22); border-radius: 999px;
        background: #fff; color: var(--accent); font: inherit; font-weight: 800;
        cursor: pointer; transition: 150ms;
      }

      .message-icon:hover { background: #f8f4ff; transform: translateY(-1px); }

      .delete-patient-btn {
        width: 34px; height: 34px; display: inline-grid; place-items: center;
        border: 1px solid rgba(176, 45, 45, 0.24); border-radius: 999px;
        background: #fff; color: #a32626; font: inherit; font-weight: 800;
        cursor: pointer; transition: 150ms;
      }

      .delete-patient-btn:hover { background: #fff0f0; transform: translateY(-1px); }

      .channel-tabs {
        display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 18px;
        border-bottom: 1px solid var(--line); background: #fbfcff;
      }

      .channel-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

      .modal {
        position: fixed; inset: 0; z-index: 1000;
        display: none; align-items: center; justify-content: center;
        padding: 18px; background: rgba(31, 45, 102, 0.28);
      }

      .modal.open { display: flex; }

      .modal-card {
        width: min(720px, 100%); max-height: min(720px, 88vh);
        overflow: hidden; border: 1px solid var(--line); border-radius: 20px;
        background: #fff; box-shadow: 0 24px 60px rgba(31, 45, 102, 0.2);
      }

      .modal-head {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--line);
      }

      .modal-title { margin: 0; font-size: 1.1rem; font-weight: 800; }

      .thread-content {
        max-height: 440px; overflow: auto; padding: 16px 18px;
        display: grid; gap: 10px;
      }

      .thread-message {
        padding: 12px 14px; border: 1px solid var(--line); border-radius: 14px;
        background: #f8faff; line-height: 1.55; white-space: pre-wrap;
      }

      .thread-message.admin { justify-self: end; background: #eef7f1; }
      .thread-meta { display: block; margin-bottom: 5px; color: var(--soft); font-size: 0.82rem; font-weight: 800; }

      .thread-attachments {
        display: grid; gap: 8px; margin-top: 10px;
      }

      .thread-photo {
        display: block; width: min(260px, 100%); max-height: 320px;
        border: 1px solid var(--line); border-radius: 12px;
        object-fit: contain; background: #fff;
      }

      .thread-message-head {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; margin-bottom: 5px;
      }

      .thread-message-head .thread-meta { margin-bottom: 0; }

      .delete-message-btn {
        border: 0; border-radius: 999px; padding: 4px 9px;
        background: #fff0f0; color: #a32626; font: inherit; font-size: 0.72rem;
        font-weight: 800; cursor: pointer;
      }

      .delete-message-btn:hover { background: #ffdede; }

      .reply-form {
        display: grid; gap: 10px; padding: 14px 18px 18px;
        border-top: 1px solid var(--line); background: #fbfcff;
      }

      .reply-form.hidden { display: none; }

      .reply-input {
        width: 100%; min-height: 92px; resize: vertical;
        border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px;
        color: var(--ink); background: #fff; font: inherit; line-height: 1.45;
        outline: none;
      }

      .reply-input:focus { border-color: var(--accent); }

      .reply-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

      .reply-status { color: var(--soft); font-size: 0.88rem; }

      .no-name { color: #aaa; font-style: italic; }

      .empty { padding: 60px 0; text-align: center; color: var(--soft); font-size: 1rem; }

      @media (max-width: 600px) {
        .patient-card { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <a class="logo-link" href="/english" aria-label="Lofi Dental home">
          <img src="../assets/영문로고.png" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-links" aria-label="Admin navigation">
          <a class="nav-link" href="/admin/calendar">Calendar</a>
          <a class="nav-link active" href="/admin/patients">Patients</a>
          <a class="nav-link" href="/admin">Admin home</a>
        </nav>
      </header>

      <div class="header">
        <h1>Patient Directory</h1>
        <button class="btn" id="refreshBtn">Refresh</button>
      </div>
      <p class="subtitle">Patients are auto-saved from reservations with appointment details, email, and concerns.</p>

      <input class="search-bar" type="search" id="searchInput" placeholder="Search by name, email, or phone…" />

      <section class="list" id="patientList" aria-live="polite"></section>
    </div>

    <div class="modal" id="threadModal" role="dialog" aria-modal="true" aria-labelledby="threadTitle">
      <div class="modal-card">
        <div class="modal-head">
          <p class="modal-title" id="threadTitle">Message threads</p>
          <button class="btn" id="closeThreadBtn" type="button">Close</button>
        </div>
        <div class="channel-tabs" aria-label="Message channels">
          <button class="btn channel-tab active" type="button" data-channel="web">Web</button>
          <button class="btn channel-tab" type="button" data-channel="instagram">Instagram DM</button>
          <button class="btn channel-tab" type="button" data-channel="email">Email</button>
        </div>
        <div class="thread-content" id="threadContent"></div>
        <form class="reply-form" id="threadReplyForm">
          <textarea class="reply-input" id="threadReplyInput" maxlength="2000" placeholder="Reply to this web consult"></textarea>
          <div class="reply-actions">
            <span class="reply-status" id="threadReplyStatus" aria-live="polite"></span>
            <button class="btn" id="threadReplyBtn" type="submit">Send reply</button>
          </div>
        </form>
      </div>
    </div>

    <div class="name-context-menu" id="nameContextMenu" role="menu" aria-hidden="true">
      <button type="button" id="editNameOption" role="menuitem">Edit</button>
    </div>

    <script>
      let allPatients = [];
      let currentThread = [];
      let currentChannel = "web";
      let currentThreadEmail = "";
      let currentReservationId = "";
      let selectedNameEl = null;
      let threadPollTimer = null;
      let patientPollTimer = null;
      let lastRenderedThreadSignature = "";
      let lastRenderedPatientSignature = "";

      function esc(v) {
        return String(v || "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function fmtDate(iso) {
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return new Intl.DateTimeFormat("en-US", { year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(d);
      }

      function threadLabel(message) {
        if (message.type === "reservation") return "PATIENT REQUEST";
        if (message.type === "customer-reply") return "PATIENT";
        if (message.type === "admin-reply") return "LOFI ADMIN";
        if (message.type === "auto-reply") return "LOFI AUTO REPLY";
        return "MESSAGE";
      }

      function threadTime(message) {
        return message.receivedAt || message.sentAt || message.createdAt || "";
      }

      function getMessageChannel(message) {
        const channel = String(message.channel || "").toLowerCase();
        if (channel === "web") return "web";
        if (channel === "instagram" || channel === "instagram-dm" || channel === "instagram_dm") return "instagram";
        if (channel === "email") return "email";
        const source = String(message.source || "").toLowerCase();
        if (source === "consult-chat" || source === "web") return "web";
        if (source === "instagram" || source === "instagram-dm" || source === "instagram_dm") return "instagram";
        return "email";
      }

      function getThreadSignature(thread) {
        return JSON.stringify((Array.isArray(thread) ? thread : []).map((message) => ({
          type: message.type || "",
          content: message.content || message.concerns || "",
          receivedAt: message.receivedAt || "",
          sentAt: message.sentAt || "",
          createdAt: message.createdAt || "",
          adminReadAt: message.adminReadAt || "",
          attachments: Array.isArray(message.attachments)
            ? message.attachments.map((attachment) => `${attachment.type || ""}:${attachment.name || ""}:${attachment.dataUrl || ""}`)
            : [],
        })));
      }

      function getPatientsSignature(patients) {
        return JSON.stringify((Array.isArray(patients) ? patients : []).map((patient) => ({
          email: patient.email || "",
          name: patient.name || "",
          phone: patient.phone || "",
          realEmail: patient.realEmail || "",
          updatedAt: patient.updatedAt || "",
          latestUpdatedAt: patient.latestReservation?.updatedAt || patient.latestReservation?.createdAt || "",
          reservationIds: Array.isArray(patient.reservationIds) ? patient.reservationIds.join("|") : "",
        })));
      }

      function renderThreadAttachments(message) {
        const attachments = Array.isArray(message.attachments) ? message.attachments : [];
        const images = attachments.filter((attachment) => String(attachment?.type || "").startsWith("image/") && attachment.dataUrl);
        if (!images.length) return "";
        return `<div class="thread-attachments">${images.map((attachment) => `<img class="thread-photo" src="${esc(attachment.dataUrl)}" alt="${esc(attachment.name || "Attached photo")}" loading="lazy" />`).join("")}</div>`;
      }

      function renderThreadChannel() {
        const content = document.getElementById("threadContent");
        const replyForm = document.getElementById("threadReplyForm");
        const replyStatus = document.getElementById("threadReplyStatus");
        const filtered = currentThread.filter(message => getMessageChannel(message) === currentChannel);
        replyForm.classList.toggle("hidden", currentChannel !== "web" || !currentThreadEmail);
        if (currentChannel !== "web") replyStatus.textContent = "Replies are currently enabled for Web consults.";
        else if (replyStatus.textContent === "Replies are currently enabled for Web consults.") replyStatus.textContent = "";
        if (!filtered.length) {
          const label = currentChannel === "web" ? "Web" : currentChannel === "instagram" ? "Instagram DM" : "Email";
          content.innerHTML = `<p class="empty">No ${esc(label)} messages yet.</p>`;
          return;
        }

        content.innerHTML = filtered.map(message => {
          const isAdmin = message.type === "admin-reply" || message.type === "auto-reply";
          const text = message.content || message.concerns || "";
          const attachments = renderThreadAttachments(message);
          const messageIndex = currentThread.indexOf(message);
          return `<article class="thread-message ${isAdmin ? "admin" : ""}"><div class="thread-message-head"><span class="thread-meta">${esc(threadLabel(message))} · ${esc(fmtDate(threadTime(message)))}</span><button class="delete-message-btn" type="button" data-index="${messageIndex}">Delete</button></div>${esc(text)}${attachments}</article>`;
        }).join("");

        content.querySelectorAll(".delete-message-btn").forEach((button) => {
          button.addEventListener("click", () => deleteThreadMessage(Number(button.dataset.index)));
        });
      }

      async function refreshCurrentThread({ showLoading = false, markRead = false } = {}) {
        const email = currentThreadEmail;
        if (!email) return;
        const content = document.getElementById("threadContent");
        if (showLoading) content.innerHTML = '<p class="empty">Loading message threads…</p>';

        try {
          const res = await fetch(`/api/admin/email-thread/${encodeURIComponent(email)}`, { headers: { Accept: "application/json" } });
          if (email !== currentThreadEmail) return;
          if (!res.ok) {
            if (showLoading) content.innerHTML = '<p class="empty">Failed to load message threads.</p>';
            return;
          }
          const data = await res.json();
          const nextThread = Array.isArray(data.thread) ? data.thread : [];
          const nextSignature = getThreadSignature(nextThread);
          currentReservationId = data.reservationId || currentReservationId;
          if (nextSignature !== lastRenderedThreadSignature) {
            currentThread = nextThread;
            lastRenderedThreadSignature = nextSignature;
            renderThreadChannel();
          }
          if (markRead && currentChannel === "web") markCurrentWebThreadRead();
        } catch {
          if (showLoading) content.innerHTML = '<p class="empty">Failed to load message threads.</p>';
        }
      }

      function stopThreadPolling() {
        if (!threadPollTimer) return;
        window.clearInterval(threadPollTimer);
        threadPollTimer = null;
      }

      function startThreadPolling() {
        stopThreadPolling();
        threadPollTimer = window.setInterval(() => {
          if (document.hidden || !currentThreadEmail) return;
          refreshCurrentThread({ markRead: currentChannel === "web" });
        }, 2500);
      }

      async function deleteThreadMessage(messageIndex) {
        if (!currentThreadEmail || !Number.isInteger(messageIndex) || messageIndex < 0) return;
        const message = currentThread[messageIndex];
        const label = threadLabel(message).toLowerCase();
        if (!confirm(`Delete this ${label} message?`)) return;

        try {
          const res = await fetch(`/api/admin/email-thread/${encodeURIComponent(currentThreadEmail)}/messages/${messageIndex}`, {
            method: "DELETE",
            headers: { Accept: "application/json" },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(data.message || "Failed to delete message.");
            return;
          }
          currentThread = Array.isArray(data.thread) ? data.thread : [];
          renderThreadChannel();
        } catch {
          alert("Failed to delete message.");
        }
      }

      async function markCurrentWebThreadRead() {
        if (!currentThreadEmail || currentChannel !== "web") return;
        try {
          const res = await fetch(`/api/admin/email-thread/${encodeURIComponent(currentThreadEmail)}/read`, {
            method: "POST",
            headers: { Accept: "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({ channel: "web" }),
          });
          if (!res.ok) return;
          const data = await res.json().catch(() => ({}));
          if (Array.isArray(data.thread)) {
            currentThread = data.thread;
            lastRenderedThreadSignature = getThreadSignature(currentThread);
            renderThreadChannel();
          }
        } catch {
          // Keep the admin thread usable even if the read receipt update fails.
        }
      }

      function setChannel(channel) {
        currentChannel = channel;
        document.querySelectorAll(".channel-tab").forEach(button => {
          button.classList.toggle("active", button.dataset.channel === channel);
        });
        renderThreadChannel();
        if (channel === "web") markCurrentWebThreadRead();
      }

      async function openThread(email) {
        const modal = document.getElementById("threadModal");
        const content = document.getElementById("threadContent");
        const replyStatus = document.getElementById("threadReplyStatus");
        const replyInput = document.getElementById("threadReplyInput");
        modal.classList.add("open");
        currentChannel = "web";
        currentThreadEmail = email;
        currentReservationId = "";
        lastRenderedThreadSignature = "";
        replyStatus.textContent = "";
        replyInput.value = "";
        document.querySelectorAll(".channel-tab").forEach(button => {
          button.classList.toggle("active", button.dataset.channel === "web");
        });
        await refreshCurrentThread({ showLoading: true, markRead: true });
        startThreadPolling();
      }

      function closeThread() {
        stopThreadPolling();
        document.getElementById("threadModal").classList.remove("open");
        document.getElementById("threadContent").innerHTML = "";
        document.getElementById("threadReplyInput").value = "";
        document.getElementById("threadReplyStatus").textContent = "";
        currentThread = [];
        currentThreadEmail = "";
        currentReservationId = "";
        lastRenderedThreadSignature = "";
      }

      async function sendThreadReply(event) {
        event.preventDefault();
        const input = document.getElementById("threadReplyInput");
        const button = document.getElementById("threadReplyBtn");
        const status = document.getElementById("threadReplyStatus");
        const content = input.value.trim();
        if (!content || !currentThreadEmail || currentChannel !== "web") return;

        button.disabled = true;
        status.textContent = "Sending...";
        try {
          const res = await fetch(`/api/admin/email-thread/${encodeURIComponent(currentThreadEmail)}/reply`, {
            method: "POST",
            headers: { Accept: "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({ content, channel: "web", reservationId: currentReservationId }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            status.textContent = data.message || "Failed to send reply.";
            return;
          }
          input.value = "";
          status.textContent = "Sent to web chat.";
          currentReservationId = data.reservationId || currentReservationId;
          if (data.message) currentThread.push(data.message);
          lastRenderedThreadSignature = getThreadSignature(currentThread);
          renderThreadChannel();
        } catch {
          status.textContent = "Failed to send reply.";
        } finally {
          button.disabled = false;
          input.focus();
        }
      }

      function render(patients) {
        const list = document.getElementById("patientList");
        if (!patients.length) {
          list.innerHTML = '<p class="empty">No patients yet. New reservations will be saved here automatically.</p>';
          return;
        }

        list.innerHTML = patients.map(p => {
          const reservations = Array.isArray(p.reservations) ? [...p.reservations] : [];
          reservations.sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
          const latestReservation = p.latestReservation || (reservations.length ? reservations[0] : null);
          const appointment = latestReservation && latestReservation.date && latestReservation.time
            ? `${latestReservation.date} ${latestReservation.time}`
            : "";
          const concerns = latestReservation && latestReservation.concerns ? latestReservation.concerns : "";
          const reservationRows = reservations.map((reservation) => {
            const when = reservation.date && reservation.time ? `${reservation.date} ${reservation.time}` : (reservation.date || reservation.time || "Reservation");
            const source = reservation.source === "consult-chat" ? "Web consult" : reservation.source === "instagram-dm" ? "Instagram DM" : "Reservation";
            return `<div class="reservation-row"><strong>${esc(when)}</strong><span>${esc(source)}</span></div>`;
          }).join("");

          return `
          <div class="patient-card">
            <div>
              <div class="patient-name-row">
                <p class="patient-name" data-email="${esc(p.email)}" data-name="${esc(p.name || "")}" title="Right-click to edit">${p.name ? esc(p.name) : '<span class="no-name">Name unknown</span>'}</p>
                <div class="patient-actions">
                  <button class="message-icon" type="button" data-email="${esc(p.email)}" aria-label="Open message threads for ${esc(p.name || "this patient")}">💬</button>
                  <button class="delete-patient-btn" type="button" data-email="${esc(p.email)}" data-name="${esc(p.name || p.realEmail || p.email || "this patient")}" aria-label="Delete ${esc(p.name || "this patient")}">×</button>
                </div>
              </div>
              <div class="patient-meta">
                ${p.phone ? `<span class="chip phone">&#128222; ${esc(p.phone)}</span>` : ""}
                ${p.realEmail ? `<span class="chip email">&#9993; ${esc(p.realEmail)}</span>` : ""}
                ${appointment ? `<span class="chip date">Reservation: ${esc(appointment)}</span>` : ""}
                <span class="chip date">First seen: ${esc(fmtDate(p.firstSeen))}</span>
                ${p.reservationIds && p.reservationIds.length ? `<span class="chip">${p.reservationIds.length} reservation${p.reservationIds.length > 1 ? "s" : ""}</span>` : ""}
              </div>
              ${reservationRows ? `<div class="reservation-list">${reservationRows}</div>` : ""}
              ${concerns ? `<div class="patient-details"><span class="detail-label">Latest reservation concerns</span>${esc(concerns)}</div>` : ""}
            </div>
          </div>`;
        }).join("");

        list.querySelectorAll(".patient-name").forEach((nameEl) => {
          nameEl.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            showNameContextMenu(nameEl, event.clientX, event.clientY);
          });
        });
        list.querySelectorAll(".message-icon").forEach((button) => {
          button.addEventListener("click", () => openThread(button.dataset.email || ""));
        });
        list.querySelectorAll(".delete-patient-btn").forEach((button) => {
          button.addEventListener("click", () => deletePatient(button.dataset.email || "", button.dataset.name || "this patient"));
        });
      }

      function showNameContextMenu(nameEl, x, y) {
        const menu = document.getElementById("nameContextMenu");
        const rect = nameEl.getBoundingClientRect();
        const anchorX = Number.isFinite(x) ? x : rect.left;
        const anchorY = Number.isFinite(y) ? y : rect.bottom + 6;
        selectedNameEl = nameEl;
        menu.classList.add("open");
        menu.setAttribute("aria-hidden", "false");

        const menuWidth = menu.offsetWidth || 120;
        const menuHeight = menu.offsetHeight || 44;
        const left = Math.min(anchorX, window.innerWidth - menuWidth - 8);
        const top = Math.min(anchorY, window.innerHeight - menuHeight - 8);
        menu.style.left = `${Math.max(8, left)}px`;
        menu.style.top = `${Math.max(8, top)}px`;
      }

      function hideNameContextMenu() {
        const menu = document.getElementById("nameContextMenu");
        menu.classList.remove("open");
        menu.setAttribute("aria-hidden", "true");
      }

      async function deletePatient(email, name) {
        if (!email) return;
        if (!confirm(`Delete ${name}? This will also remove linked reservations and message threads.`)) return;

        try {
          const res = await fetch(`/api/admin/patients/${encodeURIComponent(email)}`, {
            method: "DELETE",
            headers: { Accept: "application/json" },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(data.message || "Failed to delete patient.");
            return;
          }
          allPatients = allPatients.filter((patient) => String(patient.email || "").toLowerCase() !== String(email || "").toLowerCase());
          applySearch();
        } catch {
          alert("Failed to delete patient.");
        }
      }

      function startPatientNameEdit(nameEl) {
        if (!nameEl || nameEl.classList.contains("editing")) return;
        const email = nameEl.dataset.email || "";
        const originalName = nameEl.dataset.name || "";
        if (!email) return;

        nameEl.classList.add("editing");
        nameEl.contentEditable = "true";
        nameEl.textContent = originalName;
        nameEl.focus();

        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(nameEl);
        selection.removeAllRanges();
        selection.addRange(range);

        let finished = false;
        const finish = (save) => {
          if (finished) return;
          finished = true;
          nameEl.removeEventListener("blur", onBlur);
          nameEl.removeEventListener("keydown", onKeydown);
          nameEl.contentEditable = "false";
          nameEl.classList.remove("editing");
          const nextName = nameEl.textContent.trim();
          if (!save || !nextName || nextName === originalName) {
            nameEl.textContent = originalName || "Name unknown";
            return;
          }
          savePatientName(email, nextName, originalName, nameEl);
        };

        const onBlur = () => finish(true);
        const onKeydown = (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            finish(true);
          } else if (event.key === "Escape") {
            event.preventDefault();
            finish(false);
          }
        };

        nameEl.addEventListener("blur", onBlur);
        nameEl.addEventListener("keydown", onKeydown);
      }

      async function savePatientName(email, name, originalName, nameEl) {
        if (!email || !name) return;

        try {
          const res = await fetch(`/api/admin/patients/${encodeURIComponent(email)}`, {
            method: "PATCH",
            headers: { Accept: "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(data.message || "Failed to update patient name.");
            if (nameEl) nameEl.textContent = originalName || "Name unknown";
            return;
          }
          const patient = data.patient;
          allPatients = allPatients.map((item) => String(item.email || "").toLowerCase() === String(email || "").toLowerCase() ? { ...item, ...patient } : item);
          applySearch();
        } catch {
          alert("Failed to update patient name.");
          if (nameEl) nameEl.textContent = originalName || "Name unknown";
        }
      }

      async function load(options = {}) {
        const silent = Boolean(options.silent);
        if (!silent) document.getElementById("patientList").innerHTML = '<p class="empty">Loading…</p>';
        try {
          const res = await fetch("/api/admin/patients", { headers: { Accept: "application/json" } });
          if (!res.ok) {
            if (!silent) document.getElementById("patientList").innerHTML = '<p class="empty">Failed to load patients.</p>';
            return;
          }
          const data = await res.json();
          const nextPatients = Array.isArray(data.patients) ? data.patients : [];
          nextPatients.sort((a, b) => new Date(b.latestReservation?.updatedAt || b.latestReservation?.createdAt || b.updatedAt || b.firstSeen || 0) - new Date(a.latestReservation?.updatedAt || a.latestReservation?.createdAt || a.updatedAt || a.firstSeen || 0));
          const nextSignature = getPatientsSignature(nextPatients);
          if (silent && nextSignature === lastRenderedPatientSignature) return;
          allPatients = nextPatients;
          lastRenderedPatientSignature = nextSignature;
          applySearch();
        } catch {
          if (silent) return;
          document.getElementById("patientList").innerHTML = '<p class="empty">Failed to load patients.</p>';
        }
      }

      function startPatientPolling() {
        if (patientPollTimer) window.clearInterval(patientPollTimer);
        patientPollTimer = window.setInterval(() => {
          if (document.hidden || document.querySelector(".patient-name.editing")) return;
          load({ silent: true });
        }, 5000);
      }

      function applySearch() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        const filtered = q
          ? allPatients.filter(p =>
              (p.name || "").toLowerCase().includes(q) ||
              (p.email || "").toLowerCase().includes(q) ||
              (p.realEmail || "").toLowerCase().includes(q) ||
              (p.phone || "").toLowerCase().includes(q) ||
              (p.latestReservation?.concerns || "").toLowerCase().includes(q))
          : allPatients;
        render(filtered);
      }

      document.getElementById("searchInput").addEventListener("input", applySearch);
      document.getElementById("refreshBtn").addEventListener("click", load);
      document.getElementById("closeThreadBtn").addEventListener("click", closeThread);
      document.getElementById("threadReplyForm").addEventListener("submit", sendThreadReply);
      document.getElementById("editNameOption").addEventListener("click", () => {
        const nameEl = selectedNameEl;
        hideNameContextMenu();
        startPatientNameEdit(nameEl);
      });
      document.addEventListener("click", (event) => {
        if (!event.target.closest("#nameContextMenu")) hideNameContextMenu();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") hideNameContextMenu();
      });
      window.addEventListener("scroll", hideNameContextMenu, true);
      document.querySelectorAll(".channel-tab").forEach((button) => {
        button.addEventListener("click", () => setChannel(button.dataset.channel || "web"));
      });
      document.getElementById("threadModal").addEventListener("click", (event) => {
        if (event.target.id === "threadModal") closeThread();
      });
      load();
      startPatientPolling();
    </script>
  </body>
</html>
