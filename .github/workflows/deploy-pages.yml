name: Deploy Lofi Site to GitHub Pages

on:
  push:
    branches: ["lofi-web", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy all site files to deploy directory
        run: |
          mkdir -p _site
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "CNAME" \) -exec cp {} _site/ \;
          for dir in */; do
            case "$dir" in
              .git/|.github/|.vscode/|.data/|node_modules/|_site/) continue ;;
            esac
            cp -r "$dir" _site/
          done
          ls -la _site/

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
