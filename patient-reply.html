<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Information | lofi dental</title>
    <meta name="description" content="Please provide your information to complete your reservation." />
    <style>
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
      }
    </style>
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.14);
        --navy: #4d64d8;
        --card: rgba(255, 255, 255, 0.95);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(90, 111, 218, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(103, 128, 245, 0.16), transparent 30%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      html:lang(ko) body {
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 112px 18px 60px;
        position: relative;
      }

      .site-logo {
        position: absolute;
        top: 22px;
        left: 22px;
        z-index: 3;
        display: inline-block;
        line-height: 0;
      }

      .site-logo img {
        width: min(180px, 50vw);
        height: auto;
        display: block;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 44px 40px 48px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 4px 32px rgba(31, 45, 102, 0.08);
      }

      h1 {
        font-size: 1.55rem;
        font-weight: 700;
        color: var(--ink);
        margin: 0 0 6px;
        line-height: 1.25;
      }

      .subtitle {
        font-size: 0.95rem;
        color: #5a6fda;
        margin: 0 0 32px;
        line-height: 1.5;
      }

      .field {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field-label {
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .field-input {
        padding: 11px 14px;
        border: 1.5px solid var(--line);
        border-radius: 10px;
        font-size: 0.97rem;
        color: var(--ink);
        background: #fff;
        outline: none;
        transition: border-color 0.18s;
        font-family: inherit;
        width: 100%;
      }

      .field-input:focus {
        border-color: var(--navy);
      }

      .btn-primary {
        width: 100%;
        padding: 14px;
        background: var(--navy);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.18s, transform 0.1s;
        font-family: inherit;
      }

      .btn-primary:hover { background: #3a52c4; }
      .btn-primary:active { transform: scale(0.98); }
      .btn-primary:disabled { background: #a0aac8; cursor: not-allowed; }

      /* Success state */
      .success-card {
        text-align: center;
        display: none;
      }

      .success-icon {
        font-size: 3rem;
        margin-bottom: 16px;
      }

      .success-title {
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0 0 10px;
        color: var(--ink);
      }

      .success-msg {
        font-size: 0.95rem;
        color: #555;
        line-height: 1.6;
        margin: 0;
      }

      /* Invalid/expired state */
      .error-card {
        text-align: center;
        display: none;
      }

      .error-icon { font-size: 3rem; margin-bottom: 16px; }
      .error-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 10px; color: #c0392b; }
      .error-msg { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

      @media (max-width: 520px) {
        .card { padding: 32px 20px 36px; }
        h1 { font-size: 1.25rem; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="site-logo" id="homeLink" href="/english">
        <img id="siteLogoImage" src="/assets/영문로고.png" alt="lofi dental" />
      </a>

      <div class="card">
        <!-- Form -->
        <div id="formSection">
          <h1 id="pageTitle">Please share your information</h1>
          <p class="subtitle" id="pageSubtitle">This will help us prepare for your visit.</p>

          <form id="patientForm">
            <div class="field">
              <label class="field-label" for="name" id="nameLabel">Name</label>
              <input class="field-input" type="text" id="name" name="name" placeholder="Full name" autocomplete="name" required />
            </div>
            <div class="field">
              <label class="field-label" for="visitingFrom" id="visitingFromLabel">Where are you visiting from?</label>
              <input class="field-input" type="text" id="visitingFrom" name="visitingFrom" placeholder="e.g. Seoul, Hong Kong, Los Angeles…" required />
            </div>
            <div class="field">
              <label class="field-label" for="phone" id="phoneLabel">Phone number</label>
              <input class="field-input" type="tel" id="phone" name="phone" placeholder="+1 555-000-0000" autocomplete="tel" required />
            </div>
            <button class="btn-primary" type="submit" id="submitBtn">Submit</button>
          </form>
        </div>

        <!-- Success -->
        <div class="success-card" id="successSection">
          <div class="success-icon">✅</div>
          <h2 class="success-title" id="successTitle">Thank you!</h2>
          <p class="success-msg" id="successMsg">We've received your information. See you at your appointment!</p>
        </div>

        <!-- Error -->
        <div class="error-card" id="errorSection">
          <div class="error-icon">⚠️</div>
          <h2 class="error-title" id="errorTitle">Link expired or invalid</h2>
          <p class="error-msg" id="errorMsg">This link may have already been used or is no longer valid. Please contact us directly.</p>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const reservationId = params.get("id");
      const isKorean = params.get("lang") === "ko";

      if (isKorean) {
        document.documentElement.lang = "ko";
        document.title = "환자 정보 입력 | lofi dental";
        document.getElementById("homeLink").href = "/korean";
        document.getElementById("siteLogoImage").src = "/assets/한글로고.png";
        document.getElementById("pageTitle").textContent = "예약자 정보를 알려주세요";
        document.getElementById("pageSubtitle").textContent = "방문 준비를 위해 아래 정보를 입력해 주세요.";
        document.getElementById("nameLabel").textContent = "성함";
        document.getElementById("name").placeholder = "홍길동";
        document.getElementById("visitingFromLabel").textContent = "어디서 오시나요?";
        document.getElementById("visitingFrom").placeholder = "예: 서울, 홍콩, 로스앤젤레스…";
        document.getElementById("phoneLabel").textContent = "전화번호";
        document.getElementById("phone").placeholder = "+82 10-0000-0000";
        document.getElementById("submitBtn").textContent = "제출하기";
        document.getElementById("successTitle").textContent = "감사합니다!";
        document.getElementById("successMsg").textContent = "정보를 잘 받았습니다. 방문 시 뵙겠습니다!";
        document.getElementById("errorTitle").textContent = "링크가 만료되었거나 유효하지 않습니다";
        document.getElementById("errorMsg").textContent = "이 링크는 이미 사용되었거나 더 이상 유효하지 않습니다. 직접 연락 주세요.";
      }

      if (!reservationId) {
        document.getElementById("formSection").style.display = "none";
        document.getElementById("errorSection").style.display = "block";
      }

      document.getElementById("patientForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = isKorean ? "제출 중..." : "Submitting...";

        const name = document.getElementById("name").value.trim();
        const visitingFrom = document.getElementById("visitingFrom").value.trim();
        const phone = document.getElementById("phone").value.trim();

        try {
          const res = await fetch("/api/patient-reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: reservationId, name, visitingFrom, phone }),
          });

          if (res.ok) {
            document.getElementById("formSection").style.display = "none";
            document.getElementById("successSection").style.display = "block";
          } else {
            const data = await res.json().catch(() => ({}));
            if (res.status === 404) {
              document.getElementById("formSection").style.display = "none";
              document.getElementById("errorSection").style.display = "block";
            } else {
              alert(data.message || (isKorean ? "오류가 발생했습니다. 다시 시도해주세요." : "Something went wrong. Please try again."));
              btn.disabled = false;
              btn.textContent = isKorean ? "제출하기" : "Submit";
            }
          }
        } catch (err) {
          alert(isKorean ? "오류가 발생했습니다. 다시 시도해주세요." : "Something went wrong. Please try again.");
          btn.disabled = false;
          btn.textContent = isKorean ? "제출하기" : "Submit";
        }
      });
    </script>
  </body>
</html>
