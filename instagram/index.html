<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');

      const ADS_SEND_TO = 'AW-18173901982/LOpPCJ0a_LQcEJ75_tID';

      function handleInstagramClick(event) {
        event.preventDefault();

        const url = 'https://instagram.com/lofi_esthetic_dentistry';
        let didNavigate = false;
        const navigate = () => {
          if (didNavigate) {
            return;
          }
          didNavigate = true;
          window.location.href = url;
        };

        if (typeof gtag !== 'function') {
          navigate();
          return;
        }

        // Send conversion/outbound click event before leaving the site.
        gtag('event', 'instagram_click', {
          event_category: 'outbound',
          event_label: 'lofi_esthetic_dentistry',
          transport_type: 'beacon',
        });

        gtag('event', 'conversion', {
          send_to: ADS_SEND_TO,
          event_category: 'Contact',
          event_label: 'instagram',
          transport_type: 'beacon',
          event_callback: navigate,
        });

        // Fallback navigation in case callback is delayed.
        setTimeout(navigate, 900);
      }
    </script>
    <title>Instagram | lofi dental</title>
    <style>
      :root {
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --soft-ink: #5a6fda;
        --line: rgba(90, 111, 218, 0.24);
        --card: rgba(255, 255, 255, 0.95);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 112px 24px 24px;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
            radial-gradient(circle at top left, rgba(90, 111, 218, 0.14), transparent 28%),
            radial-gradient(circle at top right, rgba(103, 128, 245, 0.18), transparent 30%),
            linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      .site-logo {
        position: absolute;
        top: 22px;
        left: 22px;
        display: inline-block;
        line-height: 0;
      }

      .site-logo img {
        width: min(180px, 50vw);
        max-height: 72px;
        height: auto;
        display: block;
        object-fit: contain;
      }

      .card {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        padding: 28px;
        text-align: center;
      }

      h1 { margin: 0; font-size: 1.6rem; }
      p { margin: 12px 0 0; color: var(--soft-ink); line-height: 1.7; }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--ink);
        font-weight: 700;
        background: #ffffff;
      }

      @media (max-width: 760px) {
        body { padding: 96px 18px 18px; }
        .site-logo { top: 18px; left: 14px; }
        .site-logo img { width: min(160px, 52vw); max-height: 62px; }
      }
    </style>
  </head>
  <body>
    <a class="site-logo" href="/english" aria-label="Lofi Dental English home">
      <img src="../assets/logo.png?v=20260615" alt="lofi dental" />
    </a>
    <main class="card">
      <h1>Instagram</h1>
      <p>Continue to our Instagram when you are ready.</p>
      <a href="https://instagram.com/lofi_esthetic_dentistry" onclick="handleInstagramClick(event)">Go to Instagram</a>
    </main>
  </body>
</html>
