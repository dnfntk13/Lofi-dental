<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lofi DM Importer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Lofi DM Importer</h1>
      <p class="status" id="status">Open Instagram Direct, then scan.</p>
      <div class="controls">
        <button id="openInstagram" type="button">Open Instagram DM</button>
        <button id="scanDms" class="primary" type="button">Scan & save DMs</button>
      </div>
      <p class="note">Messages are saved to the local Lofi Dental admin server.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
