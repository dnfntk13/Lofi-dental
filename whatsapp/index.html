<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');

      const ADS_SEND_TO = 'AW-18173901982/LOpPCJ0a_LQcEJ75_tID';

      function handleWhatsAppClick(event) {
        event.preventDefault();

        const url = 'https://wa.me/821029848823';
        let didNavigate = false;
        const navigate = () => {
          if (didNavigate) {
            return;
          }
          didNavigate = true;
          window.location.href = url;
        };

        if (typeof gtag !== 'function') {
          navigate();
          return;
        }

        gtag('event', 'whatsapp_click', {
          event_category: 'outbound',
          event_label: '821029848823',
          transport_type: 'beacon',
        });

        gtag('event', 'conversion', {
          send_to: ADS_SEND_TO,
          event_category: 'Contact',
          event_label: 'whatsapp',
          transport_type: 'beacon',
          event_callback: navigate,
        });

        setTimeout(navigate, 900);
      }
    </script>
    <title>WhatsApp | lofi dental</title>
    <style>
      :root {
        --bg-cream: #faf5ff;
        --bg-mist: #f0e6ff;
        --ink: #4a2a6b;
        --soft-ink: #8b5fb8;
        --line: rgba(138, 95, 184, 0.24);
        --card: rgba(255, 255, 255, 0.95);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 16% 10%, rgba(220, 200, 237, 0.62), transparent 40%),
          radial-gradient(circle at 84% 18%, rgba(230, 213, 245, 0.66), transparent 44%),
          linear-gradient(170deg, var(--bg-cream) 0%, var(--bg-mist) 100%);
      }

      .card {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        padding: 28px;
        text-align: center;
      }

      h1 { margin: 0; font-size: 1.6rem; }
      p { margin: 12px 0 0; color: var(--soft-ink); line-height: 1.7; }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--ink);
        font-weight: 700;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>WhatsApp</h1>
      <p>Continue to our WhatsApp when you are ready.</p>
      <a href="https://wa.me/821029848823" onclick="handleWhatsAppClick(event)">Go to WhatsApp</a>
    </main>
  </body>
</html>
