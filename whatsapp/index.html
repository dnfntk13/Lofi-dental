    <style>
      :root {
        --bg-cream: #faf5ff;
        --bg-mist: #f0e6ff;

        --soft-ink: #8b5fb8;
        --line: rgba(138, 95, 184, 0.24);
        --card: rgba(255, 255, 255, 0.95);

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;

        background:

          radial-gradient(circle at 84% 18%, rgba(230, 213, 245, 0.66), transparent 44%),
          linear-gradient(170deg, var(--bg-cream) 0%, var(--bg-mist) 100%);
      }

      .card {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        padding: 28px;
        text-align: center;
      }

      h1 { margin: 0; font-size: 1.6rem; }
      p { margin: 12px 0 0; color: var(--soft-ink); line-height: 1.7; }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--ink);
