<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Selector | lofi dental</title>
    <meta name="description" content="Select a weekday date for your reservation." />
    <style>
      :root {
        --bg: #f4eefb;
        --ink: #201a17;
        --soft: #6d6157;
        --line: rgba(42, 31, 24, 0.12);
        --navy: #274f86;
        --card: rgba(255, 255, 255, 0.92);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(139, 92, 180, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(165, 137, 219, 0.18), transparent 30%),
          linear-gradient(180deg, #fcf9ff 0%, var(--bg) 48%, #f7f0fd 100%);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 28px 18px 40px;
        position: relative;
      }

      .back-link {
        position: absolute;
        top: 18px;
        left: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        font-size: 1.6rem;
        line-height: 1;
        text-decoration: none;
        z-index: 2;
      }

      .board {
        width: min(1180px, 100%);
        padding: 20px;
        border-radius: 30px;
        border: 1px solid rgba(42, 31, 24, 0.12);
        background: var(--card);
        box-shadow: 0 22px 56px rgba(49, 34, 21, 0.09);
        backdrop-filter: blur(14px);
      }

      .board-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .board-label {
        margin: 0;
        color: var(--soft);
        font-size: 0.96rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .board-value {
        margin: 0;
        color: var(--ink);
        font-size: clamp(1.7rem, 3vw, 2.2rem);
        font-weight: 700;
      }

      .caret {
        width: 16px;
        height: 16px;
        border-right: 3px solid rgba(42, 31, 24, 0.82);
        border-bottom: 3px solid rgba(42, 31, 24, 0.82);
        transform: rotate(45deg);
        margin-left: auto;
      }

      .date-field-wrap {
        margin-top: 8px;
      }

      .date-input {
        width: 100%;
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid rgba(255, 47, 18, 0.22);
        background: rgba(255, 255, 255, 0.96);
        color: var(--ink);
        font: inherit;
        font-size: 1rem;
        box-shadow: 0 10px 24px rgba(49, 34, 21, 0.06);
      }

      .date-input:focus {
        outline: none;
        border-color: rgba(255, 47, 18, 0.5);
        box-shadow: 0 0 0 4px rgba(255, 47, 18, 0.12);
      }

      .note {
        margin: 14px 0 0;
        color: var(--soft);
        font-size: 0.93rem;
        line-height: 1.55;
      }

      .time-panel {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(42, 31, 24, 0.08);
      }

      .time-panel.is-hidden {
        display: none;
      }

      .time-title {
        margin: 0 0 12px;
        font-size: 1.02rem;
        font-weight: 700;
        color: var(--ink);
      }

      .time-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .time-slot {
        padding: 14px 12px;
        border-radius: 16px;
        border: 1px solid rgba(220, 200, 237, 0.8);
        background: rgba(255, 255, 255, 0.94);
        color: #6a4b8e;
        font: inherit;
        font-size: 0.96rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }

      .time-slot:hover {
        transform: translateY(-1px);
        border-color: rgba(106, 75, 142, 0.5);
      }

      .time-slot.is-selected {
        background: #dcc8ed;
        color: #4a2a6b;
        border-color: #dcc8ed;
      }

      .time-note {
        margin: 12px 0 0;
        color: var(--soft);
        font-size: 0.92rem;
        line-height: 1.55;
      }

      @media (max-width: 760px) {
        .page { padding: 64px 14px 14px; }
        .back-link { top: 12px; left: 12px; width: 32px; height: 32px; }
        .board { padding: 16px; border-radius: 24px; }
        .date-input { padding: 14px 16px; }
        .time-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="back-link" href="#" aria-label="Back" onclick="history.back(); return false;">←</a>
      <section class="board" aria-label="Date selection window">
        <div class="board-head">
          <div>
            <p class="board-label">Date</p>
            <p class="board-value" id="selectedDayText">Monday</p>
          </div>
          <span class="caret" aria-hidden="true"></span>
        </div>

        <div class="date-field-wrap">
          <input id="dateInput" class="date-input" type="date" aria-label="Reservation date" />
        </div>

        <div class="time-panel is-hidden" id="timePanel" aria-label="Available times">
          <p class="time-title">Available times</p>
          <div class="time-grid" id="timeGrid"></div>
        </div>
      </section>
    </div>

    <script>
      const selectedDayText = document.getElementById("selectedDayText");

      const dateInput = document.getElementById("dateInput");
      const timePanel = document.getElementById("timePanel");
      const timeGrid = document.getElementById("timeGrid");

      function parseLocalDate(value) {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function formatLongDate(value) {
        const date = parseLocalDate(value);
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        }).format(date);
      }

      function formatISODate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatTime(minutes) {
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        const period = hours >= 12 ? "PM" : "AM";
        const displayHour = hours % 12 === 0 ? 12 : hours % 12;
        return `${displayHour}:${String(mins).padStart(2, "0")} ${period}`;
      }

      function buildTimeSlots() {
        timeGrid.innerHTML = "";

        const ranges = [
          [10 * 60, 13 * 60],
          [14 * 60, 19 * 60],
        ];

        ranges.forEach(([start, end]) => {
          for (let minutes = start; minutes < end; minutes += 30) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "time-slot";
            const startTime = formatTime(minutes);
            button.textContent = startTime;
            button.addEventListener("click", () => {
              const params = new URLSearchParams({
                date: dateInput.value,
                time: startTime,
              });
              window.location.href = `concerns.html?${params.toString()}`;
            });
            timeGrid.appendChild(button);
          }
        });
      }

      const today = new Date();
      const minDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const maxDate = new Date(minDate);
      maxDate.setMonth(maxDate.getMonth() + 3);

      dateInput.min = formatISODate(minDate);
      dateInput.max = formatISODate(maxDate);
      dateInput.value = dateInput.min;
      selectedDayText.textContent = formatLongDate(dateInput.value);
      timePanel.classList.remove("is-hidden");
      buildTimeSlots();

      dateInput.addEventListener("change", () => {
        if (dateInput.value) {
          selectedDayText.textContent = formatLongDate(dateInput.value);
          timePanel.classList.remove("is-hidden");
        }
      });
    </script>
  </body>
</html>
