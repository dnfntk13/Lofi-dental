<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Selector | lofi dental</title>
    <meta name="description" content="Select a weekday date for your reservation." />
    <style>
      :root {
        --bg: #f4eefb;
        --ink: #201a17;
        --soft: #6d6157;
        --line: rgba(42, 31, 24, 0.12);
        --navy: #274f86;
        --card: rgba(255, 255, 255, 0.92);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(139, 92, 180, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(165, 137, 219, 0.18), transparent 30%),
          linear-gradient(180deg, #fcf9ff 0%, var(--bg) 48%, #f7f0fd 100%);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 28px 18px 40px;
        position: relative;
      }

      .back-link {
        position: absolute;
        top: 18px;
        left: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        font-size: 1.6rem;
        line-height: 1;
        text-decoration: none;
        z-index: 2;
      }

      .board {
        width: min(1180px, 100%);
        padding: 20px;
        border-radius: 30px;
        border: 1px solid rgba(42, 31, 24, 0.12);
        background: var(--card);
        box-shadow: 0 22px 56px rgba(49, 34, 21, 0.09);
        backdrop-filter: blur(14px);
      }

      .board-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .board-label {
        margin: 0;
        color: var(--soft);
        font-size: 0.96rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .board-value {
        margin: 0;
        color: var(--ink);
        font-size: clamp(1.7rem, 3vw, 2.2rem);
        font-weight: 700;
      }

      .caret {
        width: 16px;
        height: 16px;
        border-right: 3px solid rgba(42, 31, 24, 0.82);
        border-bottom: 3px solid rgba(42, 31, 24, 0.82);
        transform: rotate(45deg);
        margin-left: auto;
      }

      .calendar-wrap {
        margin-top: 8px;
        border: 1px solid rgba(42, 31, 24, 0.1);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        padding: 14px;
      }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .calendar-month {
        margin: 0;
        font-size: 1rem;
        color: var(--ink);
        font-weight: 700;
      }

      .calendar-nav {
        border: 1px solid rgba(42, 31, 24, 0.14);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        width: 34px;
        height: 34px;
        font-size: 1rem;
        cursor: pointer;
      }

      .calendar-nav:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .calendar-weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .calendar-weekday {
        text-align: center;
        color: var(--soft);
        font-size: 0.82rem;
        font-weight: 700;
        padding: 4px 0;
      }

      .calendar-day,
      .calendar-day-empty {
        min-height: 42px;
        border-radius: 12px;
      }

      .calendar-day {
        border: 1px solid rgba(220, 200, 237, 0.8);
        background: #fff;
        color: #4a2a6b;
        font: inherit;
        cursor: pointer;
      }

      .calendar-day:hover {
        border-color: rgba(106, 75, 142, 0.55);
      }

      .calendar-day.is-selected {
        background: #dcc8ed;
        border-color: #dcc8ed;
        color: #4a2a6b;
        font-weight: 700;
      }

      .calendar-day.is-closed {
        color: #d32020;
        border-color: rgba(211, 32, 32, 0.28);
        background: rgba(255, 245, 245, 0.9);
        cursor: not-allowed;
      }

      .calendar-day.is-out {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .cursor-tooltip {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 9999;
        pointer-events: none;
        transform: translate(12px, 14px);
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(42, 31, 24, 0.14);
        background: rgba(255, 255, 255, 0.96);
        color: var(--soft);
        font-size: 0.86rem;
        line-height: 1;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
      }

      .cursor-tooltip.is-visible {
        opacity: 1;
        visibility: visible;
      }

      .calendar-day-empty {
        background: transparent;
      }

      .note {
        margin: 14px 0 0;
        color: var(--soft);
        font-size: 0.93rem;
        line-height: 1.55;
      }

      .time-panel {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(42, 31, 24, 0.08);
      }

      .time-panel.is-hidden {
        display: none;
      }

      .time-title {
        margin: 0 0 12px;
        font-size: 1.02rem;
        font-weight: 700;
        color: var(--ink);
      }

      .closed-banner {
        grid-column: 1 / -1;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(42, 31, 24, 0.12);
        background: rgba(255, 255, 255, 0.9);
        color: var(--soft);
        text-align: center;
        font-size: 0.95rem;
      }

      .time-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .time-slot {
        padding: 14px 12px;
        border-radius: 16px;
        border: 1px solid rgba(220, 200, 237, 0.8);
        background: rgba(255, 255, 255, 0.94);
        color: #6a4b8e;
        font: inherit;
        font-size: 0.96rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }

      .time-slot:hover {
        transform: translateY(-1px);
        border-color: rgba(106, 75, 142, 0.5);
      }

      .time-slot.is-selected {
        background: #dcc8ed;
        color: #4a2a6b;
        border-color: #dcc8ed;
      }

      .time-slot.is-disabled {
        opacity: 0.42;
        cursor: not-allowed;
        transform: none;
      }

      .time-note {
        margin: 12px 0 0;
        color: var(--soft);
        font-size: 0.92rem;
        line-height: 1.55;
      }

      @media (max-width: 760px) {
        .page { padding: 64px 14px 14px; }
        .back-link { top: 12px; left: 12px; width: 32px; height: 32px; }
        .board { padding: 16px; border-radius: 24px; }
        .calendar-wrap { padding: 12px; }
        .time-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="back-link" href="#" aria-label="Back" onclick="history.back(); return false;">←</a>
      <section class="board" aria-label="Date selection window">
        <div class="board-head">
          <div>
            <p class="board-label">Date</p>
            <p class="board-value" id="selectedDayText">Monday</p>
          </div>
          <span class="caret" aria-hidden="true"></span>
        </div>

        <div class="calendar-wrap" aria-label="Reservation calendar">
          <div class="calendar-head">
            <button id="prevMonth" class="calendar-nav" type="button" aria-label="Previous month">&lt;</button>
            <p id="calendarMonth" class="calendar-month">Month</p>
            <button id="nextMonth" class="calendar-nav" type="button" aria-label="Next month">&gt;</button>
          </div>
          <div class="calendar-weekdays">
            <div class="calendar-weekday">Sun</div>
            <div class="calendar-weekday">Mon</div>
            <div class="calendar-weekday">Tue</div>
            <div class="calendar-weekday">Wed</div>
            <div class="calendar-weekday">Thu</div>
            <div class="calendar-weekday">Fri</div>
            <div class="calendar-weekday">Sat</div>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <div class="time-panel is-hidden" id="timePanel" aria-label="Available times">
          <p class="time-title" id="timeTitle">Available times</p>
          <div class="time-grid" id="timeGrid"></div>
        </div>
      </section>
    </div>

    <div id="cursorTooltip" class="cursor-tooltip" aria-hidden="true"></div>

    <script>
      const selectedDayText = document.getElementById("selectedDayText");
      const cursorTooltip = document.getElementById("cursorTooltip");

      const calendarMonth = document.getElementById("calendarMonth");
      const calendarGrid = document.getElementById("calendarGrid");
      const prevMonthButton = document.getElementById("prevMonth");
      const nextMonthButton = document.getElementById("nextMonth");
      const timePanel = document.getElementById("timePanel");
      const timeTitle = document.getElementById("timeTitle");
      const timeGrid = document.getElementById("timeGrid");

      const koreanHolidays = new Set([
        "2026-01-01",
        "2026-02-16", "2026-02-17", "2026-02-18",
        "2026-03-01", "2026-03-02",
        "2026-05-05", "2026-05-24", "2026-05-25",
        "2026-06-06",
        "2026-08-15", "2026-08-17",
        "2026-10-03", "2026-10-05", "2026-10-06", "2026-10-07", "2026-10-09",
        "2026-12-25",
        "2027-01-01",
        "2027-02-06", "2027-02-07", "2027-02-08",
        "2027-03-01",
        "2027-05-05", "2027-05-13",
        "2027-06-06", "2027-06-07",
        "2027-08-15", "2027-08-16",
        "2027-09-14", "2027-09-15", "2027-09-16",
        "2027-10-03", "2027-10-04", "2027-10-09",
        "2027-12-25",
      ]);

      function parseLocalDate(value) {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function formatLongDate(value) {
        const date = parseLocalDate(value);
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        }).format(date);
      }

      function formatISODate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatTime(minutes) {
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        const period = hours >= 12 ? "PM" : "AM";
        const displayHour = hours % 12 === 0 ? 12 : hours % 12;
        return `${displayHour}:${String(mins).padStart(2, "0")} ${period}`;
      }

      function isWeekend(dateValue) {
        const day = parseLocalDate(dateValue).getDay();
        return day === 0 || day === 6;
      }

      function isKoreanHoliday(dateValue) {
        return koreanHolidays.has(dateValue);
      }

      function getClosedType(dateValue) {
        if (isKoreanHoliday(dateValue)) return "holiday";
        if (isWeekend(dateValue)) return "weekend";
        return null;
      }

      function isOutOfRange(dateObj, minDate, maxDate) {
        return dateObj < minDate || dateObj > maxDate;
      }

      function isSameDate(a, b) {
        return (
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }

      function buildTimeSlots() {
        timeGrid.innerHTML = "";

        if (isWeekend(selectedDateISO) || isKoreanHoliday(selectedDateISO)) {
          timeTitle.textContent = "Closed";
          const closedBanner = document.createElement("div");
          closedBanner.className = "closed-banner";
          closedBanner.textContent = "Closed on weekends and Korean public holidays.";
          timeGrid.appendChild(closedBanner);
          return;
        }

        timeTitle.textContent = "Available times";

        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        const isToday = selectedDateISO === formatISODate(new Date(now.getFullYear(), now.getMonth(), now.getDate()));

        const ranges = [
          [10 * 60, 13 * 60],
          [14 * 60, 19 * 60],
        ];

        ranges.forEach(([start, end]) => {
          for (let minutes = start; minutes < end; minutes += 30) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "time-slot";
            const startTime = formatTime(minutes);
            button.textContent = startTime;

            const isPastTime = isToday && minutes < nowMinutes;
            if (isPastTime) {
              button.classList.add("is-disabled");
              button.disabled = true;
              timeGrid.appendChild(button);
              continue;
            }

            button.addEventListener("click", () => {
              const params = new URLSearchParams({
                date: selectedDateISO,
                time: startTime,
              });
              window.location.href = `concerns.html?${params.toString()}`;
            });
            timeGrid.appendChild(button);
          }
        });
      }

      const today = new Date();
      const minDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const maxDate = new Date(minDate);
      maxDate.setMonth(maxDate.getMonth() + 3);

      let selectedDateISO = formatISODate(minDate);
      let viewYear = minDate.getFullYear();
      let viewMonth = minDate.getMonth();

      function canGoPrevMonth() {
        const currentMonthStart = new Date(viewYear, viewMonth, 1);
        const minMonthStart = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
        return currentMonthStart > minMonthStart;
      }

      function canGoNextMonth() {
        const currentMonthStart = new Date(viewYear, viewMonth, 1);
        const maxMonthStart = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
        return currentMonthStart < maxMonthStart;
      }

      function renderCalendar() {
        calendarGrid.innerHTML = "";
        cursorTooltip.classList.remove("is-visible");
        const monthStart = new Date(viewYear, viewMonth, 1);
        const monthEnd = new Date(viewYear, viewMonth + 1, 0);

        calendarMonth.textContent = new Intl.DateTimeFormat("en-US", {
          year: "numeric",
          month: "long",
        }).format(monthStart);

        prevMonthButton.disabled = !canGoPrevMonth();
        nextMonthButton.disabled = !canGoNextMonth();

        const startOffset = monthStart.getDay();
        for (let i = 0; i < startOffset; i += 1) {
          const empty = document.createElement("div");
          empty.className = "calendar-day-empty";
          calendarGrid.appendChild(empty);
        }

        for (let day = 1; day <= monthEnd.getDate(); day += 1) {
          const dateObj = new Date(viewYear, viewMonth, day);
          const iso = formatISODate(dateObj);
          const closedType = getClosedType(iso);
          const isClosed = Boolean(closedType);
          const isDisabledRange = isOutOfRange(dateObj, minDate, maxDate);

          const button = document.createElement("button");
          button.type = "button";
          button.className = "calendar-day";
          button.textContent = String(day);

          if (iso === selectedDateISO) {
            button.classList.add("is-selected");
          }

          if (isClosed) {
            button.classList.add("is-closed");
            button.setAttribute("aria-disabled", "true");
          }

          if (isDisabledRange) {
            button.classList.add("is-out");
            button.disabled = true;
          }

          if (!isClosed && !isDisabledRange) {
            button.addEventListener("click", () => {
              selectedDateISO = iso;
              selectedDayText.textContent = formatLongDate(selectedDateISO);
              renderCalendar();
              buildTimeSlots();
            });
          }

          if (isClosed && !isDisabledRange) {
            const hintText = closedType === "holiday" ? "Korean holiday" : "Closed";
            button.addEventListener("mouseenter", (event) => {
              cursorTooltip.textContent = hintText;
              cursorTooltip.style.left = `${event.clientX}px`;
              cursorTooltip.style.top = `${event.clientY}px`;
              cursorTooltip.classList.add("is-visible");
            });

            button.addEventListener("mousemove", (event) => {
              cursorTooltip.style.left = `${event.clientX}px`;
              cursorTooltip.style.top = `${event.clientY}px`;
            });

            button.addEventListener("mouseleave", () => {
              cursorTooltip.classList.remove("is-visible");
            });

            button.addEventListener("focus", () => {
              const rect = button.getBoundingClientRect();
              cursorTooltip.textContent = hintText;
              cursorTooltip.style.left = `${rect.left + rect.width / 2}px`;
              cursorTooltip.style.top = `${rect.bottom}px`;
              cursorTooltip.classList.add("is-visible");
            });

            button.addEventListener("blur", () => {
              cursorTooltip.classList.remove("is-visible");
            });

            button.addEventListener("click", (event) => {
              event.preventDefault();
            });
          }

          calendarGrid.appendChild(button);
        }
      }

      prevMonthButton.addEventListener("click", () => {
        if (!canGoPrevMonth()) return;
        viewMonth -= 1;
        if (viewMonth < 0) {
          viewMonth = 11;
          viewYear -= 1;
        }
        renderCalendar();
      });

      nextMonthButton.addEventListener("click", () => {
        if (!canGoNextMonth()) return;
        viewMonth += 1;
        if (viewMonth > 11) {
          viewMonth = 0;
          viewYear += 1;
        }
        renderCalendar();
      });

      selectedDayText.textContent = formatLongDate(selectedDateISO);
      timePanel.classList.remove("is-hidden");
      renderCalendar();
      buildTimeSlots();
    </script>
  </body>
</html>
