<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>Tell Us | lofi dental</title>
    <meta name="description" content="Write your dental and esthetic concerns before confirming reservation." />
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.14);
        --card: rgba(255, 255, 255, 0.95);
        --accent: #cdd7ff;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(90, 111, 218, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(103, 128, 245, 0.16), transparent 30%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 112px 18px 40px;
        position: relative;
      }

      .site-logo {
        position: absolute;
        top: 22px;
        left: 22px;
        z-index: 3;
        display: inline-block;
        line-height: 0;
      }

      .site-logo img {
        width: min(180px, 50vw);
        max-height: 72px;
        height: auto;
        display: block;
        object-fit: contain;
      }

      .back-link {
        position: absolute;
        top: 24px;
        right: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        line-height: 1;
        text-decoration: none;
        z-index: 2;
      }

      .back-link svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .board {
        width: min(900px, 100%);
        padding: 24px;
        border-radius: 30px;
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: 0 22px 56px rgba(49, 34, 21, 0.09);
        backdrop-filter: blur(14px);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid var(--line);
        color: var(--soft);
        font-size: 0.92rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 3vw, 2.2rem);
        line-height: 1.2;
      }

      .copy {
        margin: 0 0 16px;
        color: var(--soft);
        line-height: 1.6;
      }

      .field-label {
        display: block;
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: var(--soft);
      }

      .concern-input {
        width: 100%;
        min-height: 210px;
        border: 1px solid rgba(255, 47, 18, 0.22);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        padding: 16px 18px;
        color: var(--ink);
        font: inherit;
        line-height: 1.55;
        resize: vertical;
      }

      .concern-input:focus {
        outline: none;
        border-color: rgba(255, 47, 18, 0.55);
        box-shadow: 0 0 0 4px rgba(255, 47, 18, 0.12);
      }

      .btn-row {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 12px 20px;
        min-height: 46px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .btn-primary {
        background: var(--accent);
        color: #1f2d66;
      }

      @media (max-width: 760px) {
        .page { padding: 96px 14px 14px; }
        .site-logo { top: 18px; left: 14px; }
        .site-logo img { width: min(160px, 52vw); max-height: 62px; }
        .back-link { top: 18px; right: 12px; width: 32px; height: 32px; }
        .board { padding: 18px; border-radius: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="site-logo" href="/english" aria-label="Lofi Dental English home">
        <img src="../assets/logo.png?v=20260615" alt="lofi dental" />
      </a>
      <a class="back-link" href="#" aria-label="Back" onclick="history.back(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18 9 12l6-6" />
        </svg>
      </a>
      <section class="board" aria-label="Concern input">
        <div class="meta">
          <span class="chip" id="dateChip">Date: -</span>
          <span class="chip" id="timeChip">Time: -</span>
        </div>

        <h1>Tell us about your dental/esthetic concerns</h1>
        <p class="copy">Please describe your symptoms, goals, or any treatment you are considering.</p>

        <form id="concernForm">
          <label class="field-label" for="concerns">Patient concerns</label>
          <textarea id="concerns" class="concern-input" placeholder="Example: I want to fix dark front teeth and discuss veneers. I also have sensitivity on the upper left side." required></textarea>

          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
        </form>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const date = params.get("date") || "-";
      const time = params.get("time") || "-";

      document.getElementById("dateChip").textContent = `Date: ${date}`;
      document.getElementById("timeChip").textContent = `Time: ${time}`;

      const concernForm = document.getElementById("concernForm");
      concernForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const concerns = document.getElementById("concerns").value.trim();

        if (!concerns) {
          return;
        }

        const apiBase = window.location.protocol === "file:" ? "http://localhost:5173" : window.location.origin;
        const endpoint = new URL("/api/reservations", apiBase).toString();

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({
              date,
              time,
              concerns,
            }),
          });

          if (!response.ok) {
            throw new Error("Failed to save reservation");
          }
        } catch {
          alert("Failed to send reservation. Please open via http://localhost:5173 and try again.");
          return;
        }

        const next = new URL("received.html", window.location.href);
        next.searchParams.set("date", date);
        next.searchParams.set("time", time);
        window.location.href = next.toString();
      });
    </script>
  </body>
</html>
