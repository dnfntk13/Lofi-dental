<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <style>
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Paperlogy';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
      }
    </style>
    <title>Tell Us | lofi dental</title>
    <meta name="description" content="Write your dental and esthetic concerns before confirming reservation." />
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.14);
        --card: rgba(255, 255, 255, 0.95);
        --accent: #cdd7ff;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(90, 111, 218, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(103, 128, 245, 0.16), transparent 30%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      html:lang(ko) body {
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 112px 18px 40px;
        position: relative;
      }

      .site-logo {
        position: absolute;
        top: 22px;
        left: 22px;
        z-index: 3;
        display: inline-block;
        line-height: 0;
      }

      .site-logo img {
        width: min(180px, 50vw);
        max-height: 72px;
        height: auto;
        display: block;
        object-fit: contain;
      }

      .back-link {
        position: absolute;
        top: 24px;
        right: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        line-height: 1;
        text-decoration: none;
        z-index: 2;
      }

      .back-link svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .board {
        width: min(900px, 100%);
        padding: 24px;
        border-radius: 30px;
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: 0 22px 56px rgba(49, 34, 21, 0.09);
        backdrop-filter: blur(14px);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid var(--line);
        color: var(--soft);
        font-size: 0.92rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 3vw, 2.2rem);
        line-height: 1.2;
      }

      .copy {
        margin: 0 0 16px;
        color: var(--soft);
        line-height: 1.6;
      }

      .field-label {
        display: block;
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: var(--soft);
      }

      .field {
        margin-bottom: 16px;
      }

      .text-input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(90, 111, 218, 0.22);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.96);
        padding: 12px 16px;
        color: var(--ink);
        font: inherit;
      }

      .text-input:focus {
        outline: none;
        border-color: rgba(90, 111, 218, 0.55);
        box-shadow: 0 0 0 4px rgba(90, 111, 218, 0.12);
      }

      .email-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .email-status {
        color: var(--soft);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .code-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: stretch;
      }

      .code-status {
        display: block;
        margin-top: 8px;
        color: var(--soft);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .concern-input {
        width: 100%;
        min-height: 210px;
        border: 1px solid rgba(255, 47, 18, 0.22);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        padding: 16px 18px;
        color: var(--ink);
        font: inherit;
        line-height: 1.55;
        resize: vertical;
      }

      .concern-input:focus {
        outline: none;
        border-color: rgba(255, 47, 18, 0.55);
        box-shadow: 0 0 0 4px rgba(255, 47, 18, 0.12);
      }

      .btn-row {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 12px 20px;
        min-height: 46px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .btn-primary {
        background: var(--accent);
        color: #1f2d66;
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(90, 111, 218, 0.22);
        color: var(--ink);
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      @media (max-width: 760px) {
        .page { padding: 96px 14px 14px; }
        .site-logo { top: 18px; left: 14px; }
        .site-logo img { width: min(160px, 52vw); max-height: 62px; }
        .back-link { top: 18px; right: 12px; width: 32px; height: 32px; }
        .board { padding: 18px; border-radius: 24px; }
        .code-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="site-logo" id="homeLink" href="/english" aria-label="Lofi Dental home">
        <img id="siteLogoImage" src="../assets/영문로고.png" alt="lofi dental" />
      </a>
      <a class="back-link" href="#" aria-label="Back" onclick="history.back(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18 9 12l6-6" />
        </svg>
      </a>
      <section class="board" aria-label="Concern input">
        <div class="meta">
          <span class="chip" id="dateChip">Date: -</span>
          <span class="chip" id="timeChip">Time: -</span>
        </div>

        <h1 id="pageTitle">Tell us about your dental/esthetic concerns</h1>
        <p class="copy" id="pageCopy">Please describe your symptoms, goals, or any treatment you are considering.</p>

        <form id="concernForm">
          <div class="field">
            <label class="field-label" id="emailLabel" for="email">Email</label>
            <input id="email" class="text-input" type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
            <div class="email-actions">
              <button id="sendCodeButton" class="btn btn-secondary" type="button">Send code</button>
              <span id="emailStatus" class="email-status" aria-live="polite"></span>
            </div>
          </div>

          <div class="field">
            <label class="field-label" id="codeLabel" for="emailCode">Verification code</label>
            <div class="code-row">
              <input id="emailCode" class="text-input" type="text" name="emailCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6-digit code" required />
              <button id="verifyCodeButton" class="btn btn-secondary" type="button">Verify</button>
            </div>
            <span id="codeStatus" class="code-status" aria-live="polite"></span>
          </div>

          <div class="field">
            <label class="field-label" id="concernsLabel" for="concerns">Patient concerns</label>
            <textarea id="concerns" class="concern-input" placeholder="Example: I want to fix dark front teeth and discuss veneers. I also have sensitivity on the upper left side." required></textarea>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Confirm reservation</button>
          </div>
        </form>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const date = params.get("date") || "-";
      const time = params.get("time") || "-";
      const isKorean = params.get("lang") === "ko";
      const text = {
        title: isKorean ? "예약 내용을 적어주세요" : "Tell us about your dental/esthetic concerns",
        copy: isKorean ? "" : "Please describe your symptoms, goals, or any treatment you are considering.",
        dateLabel: isKorean ? "날짜" : "Date",
        timeLabel: isKorean ? "시간" : "Time",
        email: isKorean ? "이메일" : "Email",
        sendCode: isKorean ? "인증 코드 보내기" : "Send code",
        sending: isKorean ? "전송 중..." : "Sending...",
        codeSent: isKorean ? "인증 코드를 보냈습니다. 메일함을 확인해주세요." : "Code sent. Please check your inbox.",
        codeLabel: isKorean ? "인증 코드" : "Verification code",
        codePlaceholder: isKorean ? "6자리 코드" : "6-digit code",
        verify: isKorean ? "확인" : "Verify",
        verifying: isKorean ? "확인 중..." : "Verifying...",
        verified: isKorean ? "이메일 인증이 완료되었습니다." : "Email verified.",
        concerns: isKorean ? "상담 내용" : "Patient concerns",
        concernsPlaceholder: isKorean ? "예: 앞니 색이 어두워서 라미네이트 상담을 받고 싶어요. 왼쪽 위 치아가 시립니다." : "Example: I want to fix dark front teeth and discuss veneers. I also have sensitivity on the upper left side.",
        submit: isKorean ? "예약 신청하기" : "Confirm reservation",
        sendTimeout: isKorean ? "인증 메일 전송이 지연되고 있습니다. 다시 시도하거나 병원으로 연락해주세요." : "Verification email is taking too long. Please try again or contact us directly.",
        sendFail: isKorean ? "인증 코드를 보내지 못했습니다." : "Failed to send verification code",
        verifyTimeout: isKorean ? "인증 확인이 지연되고 있습니다. 다시 시도해주세요." : "Verification is taking too long. Please try again.",
        verifyFail: isKorean ? "인증 코드를 확인하지 못했습니다." : "Failed to verify code",
        verifyFirst: isKorean ? "이메일 인증 코드를 먼저 확인해주세요." : "Please verify your email code first.",
        reservationTimeout: isKorean ? "예약 신청이 지연되고 있습니다. 다시 시도해주세요." : "Reservation submission is taking too long. Please try again.",
        reservationFail: isKorean ? "예약 신청을 보내지 못했습니다. 다시 시도해주세요." : "Failed to send reservation. Please open via http://localhost:5173 and try again.",
      };

      document.documentElement.lang = isKorean ? "ko" : "en";
      document.title = isKorean ? "예약 상담 내용 | lofi dental" : "Tell Us | lofi dental";
      document.getElementById("homeLink").href = isKorean ? "/korean" : "/english";
      document.getElementById("siteLogoImage").src = isKorean ? "../assets/한글로고.png" : "../assets/영문로고.png";
      document.getElementById("pageTitle").textContent = text.title;
      document.getElementById("pageCopy").textContent = text.copy;
      if (!text.copy) {
        document.getElementById("pageCopy").style.display = "none";
      }
      document.getElementById("emailLabel").textContent = text.email;
      document.getElementById("codeLabel").textContent = text.codeLabel;
      document.getElementById("concernsLabel").textContent = text.concerns;
      document.getElementById("emailCode").placeholder = text.codePlaceholder;
      document.getElementById("concerns").placeholder = text.concernsPlaceholder;
      document.getElementById("sendCodeButton").textContent = text.sendCode;
      document.getElementById("verifyCodeButton").textContent = text.verify;
      document.querySelector(".btn-primary[type='submit']").textContent = text.submit;
      document.getElementById("dateChip").textContent = `${text.dateLabel}: ${date}`;
      document.getElementById("timeChip").textContent = `${text.timeLabel}: ${time}`;

      const goToReceivedPage = (nextUrl) => {
        window.location.href = nextUrl.toString();
      };

      const trackReservationSubmit = (nextUrl) => {
        if (typeof gtag !== "function") {
          goToReceivedPage(nextUrl);
          return;
        }

        let redirected = false;
        const redirectOnce = () => {
          if (redirected) {
            return;
          }
          redirected = true;
          goToReceivedPage(nextUrl);
        };

        setTimeout(redirectOnce, 900);
        gtag("event", "reservation_submit", {
          event_category: "reservation",
          event_label: `${date} ${time}`,
          reservation_date: date,
          reservation_time: time,
          transport_type: "beacon",
          event_callback: redirectOnce,
        });
      };

      const concernForm = document.getElementById("concernForm");
      const emailInput = document.getElementById("email");
      const emailCodeInput = document.getElementById("emailCode");
      const sendCodeButton = document.getElementById("sendCodeButton");
      const verifyCodeButton = document.getElementById("verifyCodeButton");
      const emailStatus = document.getElementById("emailStatus");
      const codeStatus = document.getElementById("codeStatus");
      let emailVerified = false;

      const resetVerification = () => {
        emailVerified = false;
        codeStatus.textContent = "";
      };

      const apiBase = window.location.protocol === "file:" ? "http://localhost:5173" : window.location.origin;
      const parseApiMessage = async (response, fallback) => {
        const data = await response.json().catch(() => ({}));
        return isKorean ? fallback : data.message || fallback;
      };

      const fetchWithTimeout = async (url, options, timeoutMs = 20000) => {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, {
            ...options,
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timeout);
        }
      };

      sendCodeButton.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        if (!email) {
          emailInput.focus();
          return;
        }

        sendCodeButton.disabled = true;
          sendCodeButton.textContent = text.sending;
        emailStatus.textContent = "";
          resetVerification();

        try {
          const endpoint = new URL("/api/reservation-email-code", apiBase).toString();
          const response = await fetchWithTimeout(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({ email }),
          });

          if (!response.ok) {
            throw new Error(await parseApiMessage(response, text.sendFail));
          }

          emailStatus.textContent = text.codeSent;
          emailCodeInput.focus();
        } catch (error) {
          const message = error instanceof Error && error.name === "AbortError"
            ? text.sendTimeout
            : error instanceof Error ? error.message : text.sendFail;
          emailStatus.textContent = message;
          alert(message);
        } finally {
          sendCodeButton.disabled = false;
          sendCodeButton.textContent = text.sendCode;
        }
      });

      emailInput.addEventListener("input", resetVerification);
      emailCodeInput.addEventListener("input", resetVerification);

      verifyCodeButton.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const emailCode = emailCodeInput.value.trim();

        if (!email) {
          emailInput.focus();
          return;
        }

        if (!emailCode) {
          emailCodeInput.focus();
          return;
        }

        verifyCodeButton.disabled = true;
  verifyCodeButton.textContent = text.verifying;
        codeStatus.textContent = "";

        try {
          const endpoint = new URL("/api/reservation-email-code/verify", apiBase).toString();
          const response = await fetchWithTimeout(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({ email, emailCode }),
          });

          if (!response.ok) {
            throw new Error(await parseApiMessage(response, text.verifyFail));
          }

          emailVerified = true;
          codeStatus.textContent = text.verified;
        } catch (error) {
          emailVerified = false;
          const message = error instanceof Error && error.name === "AbortError"
            ? text.verifyTimeout
            : error instanceof Error ? error.message : text.verifyFail;
          codeStatus.textContent = message;
          alert(message);
        } finally {
          verifyCodeButton.disabled = false;
          verifyCodeButton.textContent = text.verify;
        }
      });

      concernForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = emailInput.value.trim();
        const emailCode = emailCodeInput.value.trim();
        const concerns = document.getElementById("concerns").value.trim();

        if (!email || !emailCode || !concerns) {
          return;
        }

        if (!emailVerified) {
          alert(text.verifyFirst);
          emailCodeInput.focus();
          return;
        }

        const endpoint = new URL("/api/reservations", apiBase).toString();

        try {
          const response = await fetchWithTimeout(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({
              date,
              time,
              email,
              emailCode,
              concerns,
            }),
          });

          if (!response.ok) {
            throw new Error(await parseApiMessage(response, text.reservationFail));
          }
        } catch (error) {
          const message = error instanceof Error && error.name === "AbortError"
            ? text.reservationTimeout
            : error instanceof Error ? error.message : text.reservationFail;
          alert(message);
          return;
        }

        const next = new URL("received.html", window.location.href);
        next.searchParams.set("date", date);
        next.searchParams.set("time", time);
        if (isKorean) {
          next.searchParams.set("lang", "ko");
        }
        trackReservationSubmit(next);
      });
    </script>
  </body>
</html>
