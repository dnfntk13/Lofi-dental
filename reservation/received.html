<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
    </script>
    <title>Reservation Received | lofi dental</title>
    <meta name="description" content="Reservation confirmation page." />
    <style>
      :root {
        --bg: #f5f7ff;
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.14);
        --card: rgba(255, 255, 255, 0.95);
        --accent: #cdd7ff;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(90, 111, 218, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(103, 128, 245, 0.16), transparent 30%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 48%, #edf2ff 100%);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 18px 40px;
        position: relative;
      }

      .back-link {
        position: absolute;
        top: 18px;
        left: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--ink);
        font-size: 1.6rem;
        line-height: 1;
        text-decoration: none;
        z-index: 2;
      }

      .board {
        width: min(860px, 100%);
        padding: 26px;
        border-radius: 30px;
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: 0 22px 56px rgba(49, 34, 21, 0.09);
        text-align: center;
      }

      .title {
        margin: 0 0 14px;
        font-size: clamp(1.7rem, 3vw, 2.3rem);
        line-height: 1.25;
      }

      .message {
        margin: 0;
        color: var(--soft);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .meta {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid var(--line);
        color: var(--soft);
        font-size: 0.92rem;
      }

      .btn-row {
        margin-top: 22px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border-radius: 999px;
        padding: 12px 22px;
        min-height: 46px;
        border: 1px solid transparent;
        font: inherit;
        font-weight: 700;
        background: var(--accent);
        color: #1f2d66;
      }

      @media (max-width: 760px) {
        .page { padding: 64px 14px 14px; }
        .back-link { top: 12px; left: 12px; width: 32px; height: 32px; }
        .board { padding: 20px; border-radius: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="back-link" href="#" aria-label="Back" onclick="history.back(); return false;">←</a>
      <section class="board" aria-label="Reservation received">
        <h1 class="title">You're reservation was received</h1>
        <p class="message">We will confirm your appointment ASAP.<br />(Usually takes 1~2 hours for us to confirm.)</p>

        <div class="meta">
          <span class="chip" id="dateChip">Date: -</span>
          <span class="chip" id="timeChip">Time: -</span>
        </div>

        <div class="btn-row">
          <a class="btn" href="../english.html">Back to English Home</a>
        </div>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const date = params.get("date") || "-";
      const time = params.get("time") || "-";
      document.getElementById("dateChip").textContent = `Date: ${date}`;
      document.getElementById("timeChip").textContent = `Time: ${time}`;
    </script>
  </body>
</html>
