<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Monitor Play | Lofi Dental</title>
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
      }

      :root {
        --ink: #1f2d66;
        --soft: #5a6fda;
        --line: rgba(90, 111, 218, 0.28);
        --panel: rgba(255, 255, 255, 0.88);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at 10% 10%, rgba(90, 111, 218, 0.2), transparent 38%),
          radial-gradient(circle at 90% 18%, rgba(103, 128, 245, 0.2), transparent 42%),
          linear-gradient(180deg, #f8faff 0%, #eef3ff 48%, #e7edff 100%);
        color: var(--ink);
        overflow: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        padding: min(2.4vw, 30px);
      }

      .viewport {
        width: 100%;
        height: 100%;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        overflow: hidden;
        position: relative;
        box-shadow: 0 22px 56px rgba(31, 45, 102, 0.12);
      }

      body.is-standby {
        background: #ffffff;
      }

      body.is-standby .stage {
        padding: 0;
      }

      body.is-standby .viewport {
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
        transition: opacity 500ms ease;
        pointer-events: none;
        padding: min(1.2vw, 16px);
      }

      .slide-before-after {
        place-items: center;
        padding: min(1.8vw, 22px);
      }

      .slide-before-after .case-card {
        width: min(1120px, 92vw);
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .slide-before-after .case-card img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 0;
        object-fit: cover;
        background: transparent;
      }

      .slide-before-after .case-card-featured {
        display: grid;
        grid-template-columns: minmax(0, 68%) minmax(240px, 32%);
        align-items: center;
      }

      .slide-before-after .case-card-featured img {
        height: 100%;
      }

      .slide-before-after .case-caption {
        margin: 0;
        padding: 28px 30px;
        color: #1f2d66;
        font-family: "Paperlogy", "Noto Sans KR", sans-serif;
        font-size: clamp(1.05rem, 1.5vw, 1.34rem);
        font-weight: 600;
        line-height: 1.78;
        text-align: left;
        word-break: keep-all;
      }

      .slide.is-active {
        opacity: 1;
      }

      .slide img,
      .slide iframe {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 18px;
        object-fit: contain;
        background: #ffffff;
      }

      .home-screen {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: min(3vw, 30px);
        z-index: 4;
        opacity: 0;
        transition: opacity 360ms ease;
      }

      .home-screen.is-visible {
        opacity: 1;
      }

      .home-card {
        width: min(720px, 96%);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 40px rgba(31, 45, 102, 0.08);
        padding: min(3.2vw, 34px);
        text-align: center;
      }

      .home-logo {
        width: min(420px, 88%);
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .home-copy {
        margin: 16px 0 0;
        color: var(--soft);
        font-size: clamp(1rem, 1.8vw, 1.2rem);
        line-height: 1.6;
      }

      .progress-track {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 4px;
        background: rgba(31, 45, 102, 0.08);
        z-index: 6;
        opacity: 0;
        transition: opacity 220ms ease;
      }

      .progress-bar {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #5a6fda, #1f2d66);
      }

      .home-screen {
        position: absolute;
        inset: 0;
        z-index: 7;
        opacity: 0;
        transition: opacity 360ms ease;
        pointer-events: none;
      }

      .home-screen.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .home-screen iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      body.is-standby .progress-track {
        display: none;
      }

      .viewport.is-playing .progress-track {
        opacity: 1;
        pointer-events: auto;
      }

      @media (max-width: 820px) {
        .slide-before-after .case-card-featured {
          grid-template-columns: 1fr;
        }

        .slide-before-after .case-card-featured img {
          height: auto;
        }

        .slide-before-after .case-caption {
          text-align: center;
        }
      }

      @media (max-width: 640px) {
        .slide-before-after .case-card {
          border-radius: 14px;
        }

        .slide-before-after .case-caption {
          padding: 16px 16px 18px;
          font-size: 0.98rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="viewport" id="viewport">
        <section class="home-screen is-visible" id="homeScreen" aria-label="standby screen">
          <iframe src="/" title="Lofi Dental Home"></iframe>
        </section>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>

    <script>
      var mediaItems = [
        {
          type: "image",
          src: "/assets/before-after/case-01.jpg",
          label: "Before & After 1",
          caption: "“최대한 안건드리고 못생긴 부분만 좀 개선됐으면 좋겠어요”",
          beforeAfterLayout: "featured",
          durationMs: 30000,
        },
        {
          type: "image",
          src: "/assets/before-after/case-02.jpg",
          label: "Before & After 2",
          caption: '"친구들이 라미네이트가 너무 가짜 같대요 ㅠㅠ 자연스럽게 해주세요!"',
          beforeAfterLayout: "featured",
          durationMs: 30000,
        },
        { type: "image", src: "/assets/story/waiting-room.jpg", label: "Story - Waiting Room", durationMs: 30000 },
        { type: "image", src: "/assets/story/clinic-entrance.jpg", label: "Story - Entrance", durationMs: 30000 },
        { type: "image", src: "/assets/story/shade-lab.jpg", label: "Story - Shade Lab", durationMs: 30000 },
        { type: "image", src: "/assets/story/treatment.jpg", label: "Story - Treatment", durationMs: 30000 },
        { type: "image", src: "/assets/story/collaboration.jpg", label: "Story - Collaboration", durationMs: 30000 },
        { type: "image", src: "/assets/story/operatory.jpg", label: "Story - Operatory", durationMs: 30000 },
        { type: "youtube", id: "V9zg-f-gvJg", label: "Story Video", durationMs: 30000 },
        { type: "youtube", id: "AAPNGmizVac", label: "lofi lab 1", durationMs: 30000 },
        { type: "youtube", id: "t9qh_0y6Jlw", label: "lofi lab 2", durationMs: 30000 },
        { type: "youtube", id: "b6I14PwV4Fk", label: "lofi lab 3", durationMs: 30000 }
      ];

      var WAIT_INTERVAL_MS = 60000;
      var viewport = document.getElementById("viewport");
      var homeScreen = document.getElementById("homeScreen");
      var progressBar = document.getElementById("progressBar");

      var activeIndex = -1;
      var activeTimer;
      var progressTickTimer;
      var isPlaying = false;

      var slides = mediaItems.map(function (item) {
        var slide = document.createElement("section");
        slide.className = "slide";

        if (item.type === "image") {
          if (item.beforeAfterLayout) {
            slide.classList.add("slide-before-after");
            var figure = document.createElement("figure");
            figure.className = item.beforeAfterLayout === "featured" ? "case-card case-card-featured" : "case-card";

            var img = document.createElement("img");
            img.src = item.src;
            img.alt = item.label;
            img.loading = "eager";
            figure.appendChild(img);

            var caption = document.createElement("figcaption");
            caption.className = "case-caption";
            caption.textContent = item.caption || "";
            figure.appendChild(caption);

            slide.appendChild(figure);
          } else {
            var imgOnly = document.createElement("img");
            imgOnly.src = item.src;
            imgOnly.alt = item.label;
            imgOnly.loading = "eager";
            slide.appendChild(imgOnly);
          }
        } else {
          var iframe = document.createElement("iframe");
          iframe.setAttribute("data-youtube-id", item.id);
          iframe.title = item.label;
          iframe.allow = "autoplay; encrypted-media; picture-in-picture";
          iframe.referrerPolicy = "strict-origin-when-cross-origin";
          slide.appendChild(iframe);
        }

        viewport.appendChild(slide);
        return slide;
      });

      function buildYouTubeSrc(id) {
        return "https://www.youtube.com/embed/" + id + "?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1&loop=1&playlist=" + id;
      }

      function clearVideo(slide) {
        var iframe = slide.querySelector("iframe");
        if (iframe) {
          iframe.src = "about:blank";
        }
      }

      function activateVideo(slide) {
        var iframe = slide.querySelector("iframe");
        if (iframe) {
          iframe.src = buildYouTubeSrc(iframe.getAttribute("data-youtube-id"));
        }
      }

      function renderProgress(durationMs) {
        clearInterval(progressTickTimer);
        progressBar.style.width = "0%";

        var start = Date.now();
        progressTickTimer = setInterval(function () {
          var elapsed = Date.now() - start;
          var ratio = Math.min(elapsed / durationMs, 1);
          progressBar.style.width = ratio * 100 + "%";
          if (ratio >= 1) {
            clearInterval(progressTickTimer);
          }
        }, 100);
      }

      function showSlide(index) {
        if (!isPlaying) {
          return;
        }

        if (activeIndex >= 0) {
          var prevSlide = slides[activeIndex];
          prevSlide.classList.remove("is-active");
          clearVideo(prevSlide);
        }

        if (index >= mediaItems.length) {
          stopPlaybackCycle();
          return;
        }

        activeIndex = index;
        var item = mediaItems[activeIndex];
        var slide = slides[activeIndex];

        slide.classList.add("is-active");
        if (item.type === "youtube") {
          activateVideo(slide);
        }

        renderProgress(item.durationMs);

        clearTimeout(activeTimer);
        activeTimer = setTimeout(function () {
          var nextIndex = activeIndex + 1;
          showSlide(nextIndex);
        }, item.durationMs);
      }

      function clearActiveSlide() {
        if (activeIndex >= 0) {
          var activeSlide = slides[activeIndex];
          activeSlide.classList.remove("is-active");
          clearVideo(activeSlide);
          activeIndex = -1;
        }
      }

      function startStandbyCountdown() {
        isPlaying = false;
        document.body.classList.add("is-standby");
        viewport.classList.remove("is-playing");
        clearTimeout(activeTimer);
        clearActiveSlide();
        homeScreen.classList.add("is-visible");
        activeTimer = setTimeout(function () {
          startPlaybackCycle();
        }, WAIT_INTERVAL_MS);
      }

      function startPlaybackCycle() {
        isPlaying = true;
        document.body.classList.remove("is-standby");
        viewport.classList.add("is-playing");
        clearTimeout(activeTimer);
        homeScreen.classList.remove("is-visible");
        showSlide(0);
      }

      function stopPlaybackCycle() {
        startStandbyCountdown();
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowRight" && isPlaying) {
          showSlide((activeIndex + 1) % mediaItems.length);
        }
        if (event.key === "ArrowLeft" && isPlaying) {
          showSlide((activeIndex - 1 + mediaItems.length) % mediaItems.length);
        }
      });

      startStandbyCountdown();
    </script>
  </body>
</html>
