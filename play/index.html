<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Monitor Play | Lofi Dental</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #main {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }

      #videoWrap {
        position: absolute;
        inset: 0;
        display: none;
        background: #000;
      }

      #videoWrap.active {
        display: block;
      }

      #storyVideo {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="pageWrap" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;">
      <iframe id="main" src="about:blank" style="width:100%;height:100%;border:0;display:block;background:#fff;"></iframe>
    </div>
    <div id="videoWrap">
      <video id="storyVideo" playsinline muted preload="auto"></video>
    </div>

    <script>
      var sequence = [
        { type: "page", url: "/meetdrkim.html?play=1" },
        { type: "video", src: "/assets/story/lofi-lab-dentistryisart.mp4" },
        { type: "video", src: "/assets/story/lofi-lab-primemill.mp4" },
        { type: "video", src: "/assets/story/lofi-lab-veneers.mp4" }
      ];

      var pageWrap  = document.getElementById("pageWrap");
      var mainFrame = document.getElementById("main");
      var videoWrap = document.getElementById("videoWrap");
      var storyVideo = document.getElementById("storyVideo");
      var current   = 0;
      var fallbackTimer = null;

      function clearAllTimers() {
        if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
      }

      function advance() {
        clearAllTimers();
        storyVideo.pause();
        current = (current + 1) % sequence.length;
        showItem(current);
      }

      function playElement(video) {
        video.muted = true;
        video.playsInline = true;
        var attempt = video.play();
        if (attempt && typeof attempt.catch === "function") {
          attempt.catch(function () {
            video.muted = true;
            video.play().catch(function () { advance(); });
          });
        }
      }

      function showPage(item) {
        pageWrap.style.display = "block";
        videoWrap.classList.remove("active");
        storyVideo.removeAttribute("src");
        storyVideo.load();
        mainFrame.onload = function () {
          clearAllTimers();
          var frameDoc = mainFrame.contentDocument || mainFrame.contentWindow.document;
          var pageVideo = frameDoc && frameDoc.querySelector("video");
          if (!pageVideo) { advance(); return; }
          pageVideo.controls = false;
          pageVideo.loop = false;
          pageVideo.currentTime = 0;
          pageVideo.addEventListener("ended", advance, { once: true });
          fallbackTimer = setTimeout(advance, 12 * 60 * 1000);
          playElement(pageVideo);
        };
        mainFrame.src = item.url;
      }

      function showVideo(item) {
        pageWrap.style.display = "none";
        videoWrap.classList.add("active");
        mainFrame.onload = null;
        mainFrame.src = "about:blank";
        storyVideo.onended = advance;
        storyVideo.onerror = advance;
        storyVideo.src = item.src;
        storyVideo.currentTime = 0;
        fallbackTimer = setTimeout(advance, 12 * 60 * 1000);
        playElement(storyVideo);
      }

      function showItem(idx) {
        clearAllTimers();
        var item = sequence[idx];
        if (item.type === "page") showPage(item);
        else showVideo(item);
      }

      window.onload = function () { showItem(0); };
    </script>
  </body>
</html>
