<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Monitor Play | Lofi Dental</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe id="main" src="/"></iframe>
    <script>
      var pages = [
        "/",
        "/%EB%A1%9C%EC%9A%B0%ED%8C%8C%EC%9D%B4%20%EC%9D%B4%EC%95%BC%EA%B8%B0.html",
        "/before-after.html",
        "/lofi-lab.html"
      ];
      var current = 0;
      var frame = document.getElementById("main");
      function next() {
        current = (current + 1) % pages.length;
        frame.src = pages[current];
      }
      setInterval(next, 30000);
    </script>
  </body>
</html>
