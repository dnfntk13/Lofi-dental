<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Monitor Play | Lofi Dental</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #main {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }
      #ytPlayer,
      #ytPlayer iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100% !important;
        height: 100% !important;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="pageWrap" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;">
      <iframe id="main" src="about:blank" style="width:100%;height:100%;border:0;display:block;background:#fff;"></iframe>
    </div>
    <div id="videoWrap" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;">
      <div id="ytPlayer"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      var sequence = [
        { type: "page", url: "/" },
        { type: "page", url: "/before-after.html" },
        { type: "video", id: "AAPNGmizVac" },
        { type: "video", id: "t9qh_0y6Jlw" },
        { type: "video", id: "b6I14PwV4Fk" }
      ];
      var PAGE_DURATION = 30000;

      var pageWrap  = document.getElementById("pageWrap");
      var videoWrap = document.getElementById("videoWrap");
      var mainFrame = document.getElementById("main");
      var current   = 0;
      var slideTimer = null;
      var ytPlayer  = null;
      var ytReady   = false;

      function advance() {
        if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
        current = (current + 1) % sequence.length;
        showItem(current);
      }

      function showItem(idx) {
        if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
        var item = sequence[idx];

        if (item.type === "video") {
          pageWrap.style.display  = "none";
          videoWrap.style.display = "block";

          if (ytReady) {
            ytPlayer.loadVideoById(item.id);
          } else {
            /* YT API not ready yet — retry after 500ms */
            slideTimer = setTimeout(function () { showItem(idx); }, 500);
          }
          /* no slideTimer set here — onStateChange(0) triggers advance() */
        } else {
          pageWrap.style.display  = "block";
          videoWrap.style.display = "none";
          mainFrame.src = item.url;
          slideTimer = setTimeout(advance, PAGE_DURATION);
        }
      }

      function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player("ytPlayer", {
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: 1,
            mute: 1,
            controls: 0,
            rel: 0,
            playsinline: 1,
            modestbranding: 1
          },
          events: {
            onReady: function () {
              ytReady = true;
            },
            onStateChange: function (e) {
              if (e.data === YT.PlayerState.ENDED) {
                advance();
              }
            },
            onError: function () {
              advance();
            }
          }
        });
      }

      window.onload = function () { showItem(0); };
    </script>
  </body>
</html>
