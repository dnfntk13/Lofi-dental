<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZKDLXLXDRE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZKDLXLXDRE');
      gtag('config', 'AW-18173901982');
    </script>
    <title>Explore | Lofi Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-cream: #f5f7ff;
        --bg-mist: #e7edff;
        --ink: #1f2d66;
        --line: rgba(90, 111, 218, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(90, 111, 218, 0.18), transparent 42%),
          radial-gradient(circle at 88% 14%, rgba(103, 128, 245, 0.2), transparent 46%),
          linear-gradient(180deg, #f8faff 0%, var(--bg-cream) 48%, var(--bg-mist) 100%);
      }

      .page {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 28px 0 76px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        flex-wrap: wrap;
      }

      .logo-link {
        display: inline-block;
        color: inherit;
        text-decoration: none;
        line-height: 0;
      }

      .logo-img {
        max-width: 432px;
        height: auto;
        display: block;
        margin-left: -10px;
      }

      .nav-back {
        margin-left: auto;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .nav-back a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        text-decoration: none;
        color: var(--ink);
        line-height: 1;
        transition: 180ms ease;
      }

      .nav-back svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke-width: 1.9;
      }

      .nav-back a:hover {
        transform: translateX(-2px);
      }

      main {
        margin-top: 40px;
      }

      .clinic-gallery {
        margin-top: 28px;
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: 14px;
        animation: rise 740ms ease both;
      }

      .gallery-item {
        margin: 0;
        min-height: 0;
        aspect-ratio: 4 / 3;
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        image-orientation: from-image;
      }

      body.play-signage-fix .gallery-item img {
        object-fit: contain;
        transform: rotate(90deg);
        transform-origin: center center;
        background: #ffffff;
      }

      .gallery-item-featured {
        grid-row: span 2;
        aspect-ratio: 4 / 5;
      }

      .gallery-stack {
        display: grid;
        gap: 14px;
      }

      .gallery-strip {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .video-section {
        margin: 32px auto 0;
        width: min(420px, 100%);
        animation: rise 780ms ease both;
      }

      .video-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 9 / 16;
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 30px rgba(32, 49, 43, 0.06);
      }

      .video-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 820px) {
        .clinic-gallery {
          grid-template-columns: 1fr;
        }

        .gallery-item-featured {
          grid-row: auto;
          aspect-ratio: 4 / 3;
        }

        .gallery-strip {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(560px, 92vw);
        }

        .gallery-item,
        .gallery-item-featured,
        .video-frame {
          border-radius: 14px;
        }

        .gallery-strip {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="logo-link" href="/english" aria-label="Lofi Dental English home">
          <img src="assets/영문로고.png" alt="lofi dental" class="logo-img" />
        </a>
        <nav class="nav-back">
          <a href="/english" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 18 9 12l6-6" />
            </svg>
          </a>
        </nav>
      </header>

      <main>
        <section class="clinic-gallery" aria-label="Inside lofi dental">
          <figure class="gallery-item gallery-item-featured">
            <img src="assets/story/waiting-room.jpg" alt="Softly lit waiting room at lofi dental" loading="lazy" />
          </figure>
          <div class="gallery-stack">
            <figure class="gallery-item">
              <img src="assets/story/clinic-entrance.jpg" alt="lofi dental entrance sign" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/shade-lab.jpg" alt="Digital shade matching and ceramic lab equipment" loading="lazy" />
            </figure>
          </div>
          <div class="gallery-strip">
            <figure class="gallery-item">
              <img src="assets/story/treatment.jpg" alt="Clinical treatment at lofi dental" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/collaboration.jpg" alt="Clinical collaboration through the glass lab area" loading="lazy" />
            </figure>
            <figure class="gallery-item">
              <img src="assets/story/operatory.jpg" alt="lofi dental operatory and equipment" loading="lazy" />
            </figure>
          </div>
        </section>

        <section class="video-section" aria-label="lofi dental YouTube Shorts">
          <div class="video-frame">
            <iframe
              src="https://www.youtube.com/embed/V9zg-f-gvJg"
              title="lofi dental YouTube Shorts"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
        </section>
      </main>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        if (!params.has("play")) {
          return;
        }

        var ua = navigator.userAgent || "";
        if (/LG|webOS|Web0S|Signage|UH5F/i.test(ua)) {
          document.body.classList.add("play-signage-fix");
        }
      })();
    </script>
  </body>
</html>
